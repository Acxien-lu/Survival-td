<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0b0d10">
<title>SURVIVAL TD</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    background: #0b0d10;
    font-family: 'Segoe UI', 'Malgun Gothic', sans-serif;
    overflow: hidden;
    touch-action: none;
  }
  #game-wrap {
    position: relative; width: 100%; height: 100%;
    display: flex; justify-content: center; align-items: center;
  }
  canvas { display: block; background: #14181d; max-width: 100%; max-height: 100%; }

  #util-bar {
    position: absolute; top: 96px; right: 8px;
    display: flex; flex-direction: column; gap: 8px; z-index: 5;
  }
  .util-btn {
    width: 44px; height: 44px; border-radius: 10px;
    border: 1px solid #3a4350; background: rgba(20,24,29,0.85);
    color: #e8e3d8; font-size: 14px; font-weight: 700; cursor: pointer;
  }
  .util-btn.on { border-color: #c33b2e; color: #ff8a7a; }

  /* ---- 카드 선택 ---- */
  #skill-overlay {
    position: absolute; inset: 0;
    background: rgba(5,6,8,0.84);
    display: none; flex-direction: column;
    justify-content: center; align-items: center;
    gap: 14px; z-index: 10;
  }
  #skill-overlay h2 { color: #e8e3d8; font-size: 20px; letter-spacing: 2px; }
  #skill-overlay .sub { color: #8a8577; font-size: 13px; margin-bottom: 8px; }
  .skill-card {
    width: min(330px, 88vw);
    background: linear-gradient(160deg, #1d232b, #12161b);
    border: 1px solid #3a4350; border-radius: 10px;
    padding: 13px 15px; cursor: pointer;
    transition: transform .12s;
  }
  .skill-card:active { transform: scale(0.97); }
  .skill-card.hero    { border-left: 4px solid #c33b2e; }
  .skill-card.recruit { border-left: 4px solid #d9a441; }
  .skill-card.ally    { border-left: 4px solid #4f7fae; }
  .skill-card .tag  { font-size: 11px; font-weight: 700; letter-spacing: 1px; }
  .skill-card.hero    .tag { color: #e06a5c; }
  .skill-card.recruit .tag { color: #d9a441; }
  .skill-card.ally    .tag { color: #6fa3d4; }
  .skill-card .name { color: #f0ece1; font-size: 16px; font-weight: 700; margin-top: 2px; }
  .skill-card .desc { color: #9aa3ad; font-size: 13px; margin-top: 3px; line-height: 1.4; }

  /* ---- 시작 / 게임오버 ---- */
  #center-overlay {
    position: absolute; inset: 0;
    background: rgba(5,6,8,0.88);
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    gap: 16px; z-index: 20; text-align: center;
  }
  #center-overlay h1 { color: #e8e3d8; font-size: 30px; letter-spacing: 4px; }
  #center-overlay h1 span { color: #c33b2e; }
  #center-overlay p { color: #8a8577; font-size: 14px; line-height: 1.7; padding: 0 24px; }
  #center-overlay button {
    background: #c33b2e; color: #fff; border: none;
    font-size: 17px; font-weight: 700; letter-spacing: 2px;
    padding: 13px 46px; border-radius: 8px; cursor: pointer;
  }
  #center-overlay button:active { transform: scale(0.96); }

  #pause-badge {
    position: absolute; inset: 0; display: none;
    justify-content: center; align-items: center;
    background: rgba(5,6,8,0.6);
    color: #e8e3d8; font-size: 22px; letter-spacing: 4px; z-index: 15;
  }

  /* ---- 캠프 시설 패널 (마을회관 / 의무대 공용) ---- */
  #facility-panel {
    position: absolute; inset: 0;
    background: rgba(5,6,8,0.8);
    display: none; flex-direction: column;
    justify-content: center; align-items: center;
    gap: 12px; z-index: 25; text-align: center;
  }
  .fac-box {
    width: min(320px, 86vw);
    background: linear-gradient(160deg, #241e14, #17130d);
    border: 1px solid #5a4c34;
    border-radius: 12px;
    padding: 20px 18px;
  }
  .fac-box h3 { color: #e8d9b8; font-size: 19px; margin-bottom: 6px; }
  .fac-box .desc { color: #9aa3ad; font-size: 13px; line-height: 1.6; margin-bottom: 14px; }
  .fac-box .kills { color: #d9a441; font-weight: 700; }
  .fac-action {
    width: 100%;
    background: #6b5a3e; color: #f0ece1;
    border: 1px solid #8a7550; border-radius: 8px;
    font-size: 15px; font-weight: 700;
    padding: 12px; cursor: pointer;
  }
  .fac-action:disabled { opacity: 0.4; }
  .fac-action:active:not(:disabled) { transform: scale(0.97); }
  .fac-close {
    background: none; border: none;
    color: #8a8577; font-size: 14px;
    padding: 10px; cursor: pointer; text-decoration: underline;
  }

  /* ---- 숙소: 동료 교체 ---- */
  #lodge-panel {
    position: absolute; inset: 0;
    background: rgba(5,6,8,0.85);
    display: none; flex-direction: column;
    justify-content: center; align-items: center;
    gap: 10px; z-index: 25;
  }
  #lodge-panel h3 { color: #e8d9b8; font-size: 19px; }
  #lodge-panel .hint { color: #8a8577; font-size: 12px; margin-bottom: 4px; }
  .lodge-section {
    width: min(330px, 88vw);
    background: rgba(20,24,29,0.9);
    border: 1px solid #4a4030; border-radius: 12px;
    padding: 12px;
  }
  .lodge-section .sec-title { color: #d9a441; font-size: 13px; font-weight: 700; margin-bottom: 8px; }
  .roster-row {
    display: flex; align-items: center; justify-content: space-between;
    background: #1d232b; border: 1px solid #3a4350; border-radius: 8px;
    padding: 9px 12px; margin-bottom: 6px; cursor: pointer;
  }
  .roster-row:active { transform: scale(0.98); }
  .roster-row .rname { color: #f0ece1; font-size: 14px; font-weight: 700; }
  .roster-row .rlv { color: #6fa3d4; font-size: 12px; }
  .roster-row .rmove { color: #8a8577; font-size: 11px; }
  .roster-empty { color: #5a5548; font-size: 12px; padding: 6px 2px; }

  /* ---- 개인 훈련소 ---- */
  #train-panel {
    position: absolute; inset: 0;
    background: rgba(5,6,8,0.85);
    display: none; flex-direction: column;
    justify-content: center; align-items: center;
    gap: 10px; z-index: 25;
  }
  #train-panel h3 { color: #e8d9b8; font-size: 19px; }
  #train-panel .hint { color: #8a8577; font-size: 12px; margin-bottom: 4px; }
  .train-row {
    display: flex; align-items: center; justify-content: space-between;
    gap: 8px;
    background: #1d232b; border: 1px solid #3a4350; border-radius: 8px;
    padding: 9px 12px; margin-bottom: 6px;
  }
  .train-row .tname { color: #f0ece1; font-size: 14px; font-weight: 700; }
  .train-row .tdesc { color: #9aa3ad; font-size: 11px; }
  .train-buy {
    background: #6b5a3e; color: #f0ece1;
    border: 1px solid #8a7550; border-radius: 6px;
    font-size: 12px; font-weight: 700;
    padding: 8px 10px; cursor: pointer; white-space: nowrap;
  }
  .train-buy:disabled { opacity: 0.35; }
  .train-buy:active:not(:disabled) { transform: scale(0.95); }

  /* ---- 게임 동아리 ---- */
  #club-panel {
    position: absolute; inset: 0;
    background: rgba(5,6,8,0.85);
    display: none; flex-direction: column;
    justify-content: center; align-items: center;
    gap: 10px; z-index: 25;
  }
  #club-panel h3 { color: #e8d9b8; font-size: 19px; }
  #club-panel .hint { color: #8a8577; font-size: 12px; margin-bottom: 4px; padding: 0 30px; text-align: center; line-height: 1.6; }
  .club-locked { color: #b0a890; font-size: 13px; line-height: 1.8; text-align: center; padding: 10px 6px; }
  .train-buy.equipped { background: #c33b2e; border-color: #e06a5c; }

  /* ---- 사감 ---- */
  #warden-panel {
    position: absolute; inset: 0;
    background: rgba(5,6,8,0.85);
    display: none; flex-direction: column;
    justify-content: center; align-items: center;
    gap: 12px; z-index: 25;
  }
  #warden-panel h3 { color: #e8d9b8; font-size: 19px; }
  #warden-panel .hint { color: #b0a890; font-size: 13px; padding: 0 30px; text-align: center; line-height: 1.7; }
</style>
</head>
<body>
<div id="game-wrap">
  <canvas id="game"></canvas>

  <div id="util-bar">
    <button class="util-btn" id="speed-btn">x1</button>
    <button class="util-btn" id="fs-btn">⛶</button>
  </div>

  <div id="pause-badge">PAUSED</div>

  <div id="skill-overlay">
    <h2>WAVE CLEAR</h2>
    <div class="sub">하나를 선택하세요</div>
    <div id="skill-cards"></div>
  </div>

  <!-- 마을회관 / 의무대 공용 패널 (내용은 JS가 채움) -->
  <div id="facility-panel">
    <div class="fac-box">
      <h3 id="fac-title"></h3>
      <div class="desc" id="fac-desc"></div>
      <button class="fac-action" id="fac-action"></button>
      <button class="fac-close" id="fac-close">닫기</button>
    </div>
  </div>

  <!-- 숙소 패널: 동료 교체 -->
  <div id="lodge-panel">
    <h3>🛏 임시 기숙사</h3>
    <div class="hint">탭해서 출전 ↔ 대기 전환 (출전 최대 4명)</div>
    <div class="lodge-section">
      <div class="sec-title">출전 중 (<span id="deploy-count">0</span>/4)</div>
      <div id="deployed-list"></div>
    </div>
    <div class="lodge-section">
      <div class="sec-title">대기 중</div>
      <div id="reserve-list"></div>
    </div>
    <button class="fac-close" id="lodge-close">닫기</button>
  </div>

  <!-- 개인 훈련소 패널: 주인공 영구 강화 -->
  <div id="train-panel">
    <h3>🎯 개인 훈련소</h3>
    <div class="hint">보유 킬: <span id="train-kills" style="color:#d9a441; font-weight:700">0</span> · 강화당 50킬 · <b style="color:#e06a5c">영구 유지</b></div>
    <div class="lodge-section" id="train-list"></div>
    <button class="fac-close" id="train-close">닫기</button>
  </div>

  <!-- 게임 동아리 패널: 특수 스킬 장착 (30웨이브 후 개방) -->
  <div id="club-panel">
    <h3>🎮 게임 동아리</h3>
    <div class="hint" id="club-hint"></div>
    <div class="lodge-section" id="club-list" style="max-height:56vh; overflow-y:auto;"></div>
    <button class="fac-close" id="club-close">닫기</button>
  </div>

  <!-- 사감 (체육 선생님) 패널: 동료 강화 공격 해금 + 지참 카드 -->
  <div id="warden-panel">
    <h3>🏫 체육 선생님</h3>
    <div class="hint" id="warden-hint"></div>
    <button class="fac-action" id="warden-hire" style="width:min(300px,84vw)">사감으로 고용 — 300킬</button>
    <div class="lodge-section" id="carry-list" style="max-height:52vh; overflow-y:auto; width:min(320px,88vw)"></div>
    <button class="fac-close" id="warden-close">닫기</button>
  </div>

  <div id="center-overlay">
    <h1>SURVIVAL <span>TD</span></h1>
    <p id="center-text">
      정문과 본관에서 &lt;놈들&gt;이 몰려온다.<br>
      강당 앞 바리케이드를 지켜라.<br>
      드래그로 주인공을 <b>좌우</b>로 이동,<br>
      <b style="color:#d9a441">동료를 영입</b>하고 10웨이브마다 강당에서 정비하세요.
    </p>
    <button id="start-btn">전투 시작</button>
  </div>
</div>

<script>
/* ================================================================
   [0] 에셋 교체 지점 — 경로만 넣으면 도형 대신 이미지로 그립니다.
   ================================================================ */
const ASSET_URLS = {
  player: "assets/player.png",
  zombie: "assets/zombie.png",
  zombieBig: "assets/zombieBig.png",
  bullet: "",                          // 탄환은 코드 발광이 더 예뻐서 유지
  background: "assets/background.png?v=2",   // ?v=숫자: 캐시 무효화용 (이미지 교체 시 숫자 올리기)
  sniper: "assets/sniper.png",
  medic: "assets/medic.png",
  driver: "assets/driver.png",
  bomber: "assets/bomber.png",
  engineer: "assets/engineer.png",
  batter: "assets/batter.png",
  soccer: "assets/soccer.png",
  sedan: "assets/sedan.png",           // 차량 4종 (드라이버 출격)
  bike: "assets/bike.png",
  truck: "assets/truck.png",
  bus: "assets/bus.png",
  campBg: "assets/camp_bg.png?v=2",    // 강당 내부 (캠프 화면)
};
const IMAGES = {};
function preloadAssets(callback) {
  const keys = Object.keys(ASSET_URLS).filter(k => ASSET_URLS[k] !== "");
  if (keys.length === 0) { callback(); return; }
  let loaded = 0;
  keys.forEach(key => {
    const img = new Image();
    img.src = ASSET_URLS[key];
    img.onload = img.onerror = () => {
      if (img.complete && img.naturalWidth > 0) IMAGES[key] = img;
      if (++loaded === keys.length) callback();
    };
  });
}

/* ================================================================
   [1] 기본 설정
   ★ 물량전 개편: 적 수 5배 / 이동속도 절반.
     총 난이도가 폭증하지 않도록 개별 체력은 1/3,
     바리케이드 피해도 낮췄습니다. (물량으로 밀려오는 맛)
   ================================================================ */
const CONFIG = {
  logicalWidth: 420,
  logicalHeight: 740,
  barricadeY: 580,
  playerY: 636,
  barricadeMaxHp: 150,
  baseFireInterval: 0.9,    // 시작 공격속도 50% 하향 (0.45 → 0.9)
  baseDamage: 12,
  baseBulletSpeed: 540,
  wavesPerRun: 30,
  maxDeployed: 4,          // 출전 동료 제한
  maxMultishot: 5,         // 주인공 부채꼴 최대 5발
};
const W = CONFIG.logicalWidth, H = CONFIG.logicalHeight;

/* ================================================================
   [2] 동료 정의 — 6종
   ----------------------------------------------------------------
   각 동료: 고유 행동(update) + 강화 카드(maxLv 제한).
   comp.upLv[i] 로 각 강화의 현재 레벨을 추적하고,
   maxLv에 도달한 카드는 더 이상 뽑히지 않습니다.
   mover: true 인 동료는 가로로 뛰어다닙니다.
   ================================================================ */
// 점 (px,py)와 선분 (x0,y0)-(x1,y1) 사이의 최단 거리 — 레이저 판정용
function distToSeg(px, py, x0, y0, x1, y1) {
  const dx = x1 - x0, dy = y1 - y0;
  const len2 = dx * dx + dy * dy;
  let t = len2 === 0 ? 0 : ((px - x0) * dx + (py - y0) * dy) / len2;
  t = Math.max(0, Math.min(1, t));
  const cx = x0 + dx * t, cy = y0 + dy * t;
  return Math.hypot(px - cx, py - cy);
}

// 의무병 버프 헬퍼 — game 전역 상태를 읽어 배율 반환
function adrenMul() { return game.medBuff && game.medBuff.kind === "adrenaline" ? 1.5 : 1; }  // 공속
function dopaMul()  { return game.medBuff && game.medBuff.kind === "dopamine" ? 1.5 : 1; }     // 범위
function dopaOn()   { return game.medBuff && game.medBuff.kind === "dopamine"; }               // 탄 넓이 2배 등

// 이동형 동료(기공사·야구부) 공용: 방어선에 가장 가까운 적의 x로 이동
function moveToNearestX(comp, dt, speed) {
  let near = null;
  for (const z of game.zombies) if (!near || z.y > near.y) near = z;
  if (!near) return;
  const dx = near.x - comp.x;
  const step = speed * dt;
  if (Math.abs(dx) > step) comp.x += Math.sign(dx) * step;
  else comp.x = near.x;
  comp.x = Math.max(40, Math.min(W - 40, comp.x));
}

const COMPANION_DEFS = [
  {
    id: "sniper", name: "저격수", color: "#8e6fae",
    recruitDesc: "가장 체력 높은 적 저격 (2초, 기본 3관통)",
    initState: () => ({ cooldown: 0, dmgMul: 1, pierce: 3, doubleTap: false, tapQueue: 0, tapTimer: 0, atkCount: 0 }),
    fire(comp, isMain) {
      // 한 발 발사: 최대 체력 적 조준
      if (game.zombies.length === 0) return;
      let target = game.zombies[0];
      for (const z of game.zombies) if (z.hp > target.hp) target = z;
      const a = Math.atan2(target.y - CONFIG.playerY, target.x - comp.x);
      const dmg = 30 * comp.dmgMul;
      const bullet = {
        x: comp.x, y: CONFIG.playerY - 14,
        vx: Math.cos(a) * 1560, vy: Math.sin(a) * 1560,
        hitsLeft: comp.pierce,
        damage: dmg,
        sniper: true,
        wide: dopaOn() ? 2 : 1,
      };
      // 사감 강화: 메인 사격(확인 사살 제외)만 카운트, 4번째마다 탄에 번개 부여
      if (game.warden && isMain) {
        comp.atkCount++;
        if (comp.atkCount % 4 === 0) {
          bullet.sniperBolt = dmg;   // 탄 근처에 탄과 동일 피해의 번개 폭발
          game.skillBanner = { text: "번개탄!", color: "#8e6fae", life: 1.4, plain: true };
        }
      }
      game.bullets.push(bullet);
    },
    update(comp, dt) {
      // 확인 사살: 첫 발 후 0.3초 뒤 두 번째 탄 (카운트 제외 = isMain false)
      if (comp.tapQueue > 0) {
        comp.tapTimer -= dt;
        if (comp.tapTimer <= 0) {
          this.fire(comp, false);
          comp.tapQueue--;
        }
      }
      comp.cooldown -= dt;
      if (comp.cooldown > 0 || game.zombies.length === 0) return;
      this.fire(comp, true);
      comp.cooldown = 2.0 / adrenMul();   // ★ 2초 고정 (아드레날린 시 단축)
      if (comp.doubleTap) { comp.tapQueue = 1; comp.tapTimer = 0.3; }
    },
    upgrades: [
      { name: "저격수: 대물 저격총", desc: "저격 피해 +55%",                        maxLv: 6, apply: c => c.dmgMul *= 1.55 },
      { name: "저격수: 철갑탄",     desc: "관통 +2",                               maxLv: 3, apply: c => c.pierce += 2 },
      { name: "저격수: 확인 사살",   desc: "공격 방식 해금 — 0.3초 간격 2연발 사격", maxLv: 1, apply: c => c.doubleTap = true },
    ],
    // 카드 우선순위: 관통 1업 전까진 관통만.
    // 확인 사살은 어떤 강화든 1회 이상 후 등장 (관통 우선 규칙상 자동 충족)
    cardFilter: c => c.upLv[1] < 1 ? [1] : [0, 1, 2],
  },
  {
    id: "medic", name: "의무병", color: "#5b9e7d",
    recruitDesc: "접착 물약 투척 — 착지점에 감속 지역 생성 (2초마다)",
    initState: () => ({ cooldown: 1, throwCount: 0, pulseCd: 0 }),
    update(comp, dt) {
      if (comp.pulseCd > 0) comp.pulseCd -= dt;
      comp.cooldown -= dt;
      if (comp.cooldown > 0 || game.zombies.length === 0) return;
      // 맨 앞(방어선 최근접)의 적을 향해 포물선 투척 — 느려서 흘리기 쉬움
      let target = null;
      for (const z of game.zombies) if (!target || z.y > target.y) target = z;

          if (ball.y < R)     { ball.y = R;     ball.vy = Math.abs(ball.vy);  bounced = true; }
          if (ball.vy > 0 && ball.y >= CONFIG.barricadeY - R) {
            ball.y = CONFIG.barricadeY - R; ball.vy = -Math.abs(ball.vy);
            bounced = true; hitBarricade = true;
          }
          if (bounced) {
            ball.bounces++;
            spawnParticles(ball.x, ball.y, "#ffd24a", 3);
            // 8회 이후: 바리케이드 튕김이면 1회 유예, 아니면 소멸
            if (ball.bounces >= 8 && !(ball.bounces === 8 && hitBarricade)) ball.dead = true;
          }
        } else {
          // 일반 공: 좌/우/위 반사 + 바리케이드에서 정지
          if (ball.x < R)     { ball.x = R;     ball.vx = Math.abs(ball.vx); }
          if (ball.x > W - R) { ball.x = W - R; ball.vx = -Math.abs(ball.vx); }
          if (ball.y < R)     { ball.y = R;     ball.vy = Math.abs(ball.vy); }
          if (ball.vy > 0 && ball.y >= CONFIG.barricadeY - R) {
            ball.y = CONFIG.barricadeY - R;
            ball.vx = 0; ball.vy = 0;
            ball.x = Math.max(42, Math.min(W - 42, ball.x));
            ball.rest = true;
            ball.restAt = ++comp.restSeq;
          }
        }
        // 경로상의 적 타격 (좀비별 짧은 쿨다운으로 중복 타격 방지)
        for (let j = game.zombies.length - 1; j >= 0; j--) {
          const z = game.zombies[j];
          if (z.ballCd > 0) continue;
          const dx = ball.x - z.x, dy = ball.y - z.y;
          const hR = (z.size + R) * (dopaOn() ? 2 : 1);
          if (dx * dx + dy * dy < hR * hR) {
            z.hp -= comp.dmg;
            z.ballCd = 0.35;
            spawnParticles(z.x, z.y, "#e8e8ee", 3);
            if (z.hp <= 0) killZombie(j);
          }
        }
      }
      // 장외된 특수 공 제거
      comp.balls = comp.balls.filter(b => !b.dead);
    },
    // 사감 강화: 추가 인원이 특수 공을 참 — 옆 벽을 먼저 맞히고
    //   8번째로 가까운 적(부족하면 맨 뒤 적)을 노림. 8회 튕긴 뒤 장외.
    launchSpecialBall(comp) {
      if (game.zombies.length === 0) return;
      const R = 7;
      const sorted = [...game.zombies].sort((a, b) => b.y - a.y);  // 가까운 순
      const target = sorted[Math.min(7, sorted.length - 1)];        // 8번째 (없으면 맨 뒤)
      const fromLeft = comp.x < W / 2;
      // 옆 벽 거울상 조준 → 벽 먼저 맞고 타겟으로
      const aimX = fromLeft ? -target.x : 2 * W - target.x;
      const bx = fromLeft ? R + 2 : W - R - 2;   // 강당 옆쪽에서 등장
      const a = Math.atan2(target.y - (CONFIG.barricadeY - 40), aimX - bx);
      comp.balls.push({
        x: bx, y: CONFIG.barricadeY - 40,
        vx: Math.cos(a) * comp.ballSpeed, vy: Math.sin(a) * comp.ballSpeed,
        rest: false, special: true, bounces: 0, restAt: ++comp.restSeq,
      });
      game.effects.push({ type: "impact", x: bx, y: CONFIG.barricadeY - 40, life: 0.15 });
      game.skillBanner = { text: "코너킥!", color: "#d24038", life: 1.4, plain: true };
    },
    upgrades: [
      { name: "축구부: 강슛 훈련",  desc: "축구공 속도 +177 (3렙 맥스 시 저격탄의 70%)", maxLv: 3, apply: c => c.ballSpeed += 177 },
      { name: "축구부: 정조준 킥",  desc: "축구공 피해 +40%",                            maxLv: 5, apply: c => c.dmg = Math.round(c.dmg * 1.4) },
      { name: "축구부: 여분의 공",  desc: "축구공 +1개 (최대 2개, 뱅크샷 전용)",          maxLv: 1, apply: c => c.ballCount = 2 },
    ],
    // 카드 우선순위: 공 속도 1렙까진 속도만, 이후 셋 다 동일 확률
    cardFilter: c => c.upLv[0] < 1 ? [0] : [0, 1, 2],
  },
];

/* ================================================================
   [3] 주인공 스킬 풀 (개인 훈련소 전용)
   ----------------------------------------------------------------
   전부 "가산형(+n%)"이며, 구매할 때마다 가격이 2배가 됩니다.
   (50 → 100 → 200 → 400...) — 지수 비용이 성장을 자연스럽게 제동.
   trainMax: 최대 구매 횟수 (없으면 가격이 사실상의 제한)
   ================================================================ */
const HERO_SKILLS = [
  { name: "속사",       desc: "공격 속도 +10%",                       apply: s => s.fireRateMul += 0.10 },
  { name: "고화력 탄환", desc: "공격력 +10%",                          apply: s => s.damageMul += 0.10 },
  { name: "멀티 샷",     desc: "발사 탄환 +1 (최대 5발)",               apply: s => s.multishot += 1,
    available: s => s.multishot < CONFIG.maxMultishot },
  { name: "관통탄",      desc: "탄환이 적 1명을 추가 관통",              apply: s => s.pierce += 1 },
  { name: "넉백 강화",   desc: "명중 시 적을 밀어냄 +5 (최대 50)",       apply: s => s.knockback += 5, trainMax: 10 },
  { name: "대구경 개조", desc: "공격력 +20%, 공격 속도 -5% (5회 맥스)",  apply: s => { s.damageMul += 0.20; s.fireRateMul -= 0.05; }, trainMax: 5 },
];

/* ================================================================
   [4] 게임 상태
   ================================================================ */
let game, stats;
let gameSpeed = 1;
let pausedByHide = false;

// 주인공 스탯 = 훈련소에서 산 영구 강화(permHero)의 복사본.
// 웨이브 카드로 주인공을 키우는 시대는 끝났습니다 — 오직 훈련소!
function baseHeroStats() {
  return { fireRateMul: 1, damageMul: 1, multishot: 1, pierce: 0, knockback: 0, thorns: 0 };
}
function resetHeroStats() {
  stats = { ...game.permHero };
}

function resetGame() {
  game = {
    state: "battle",     // "battle" | "camp"
    running: false,
    wave: 0,
    campAtk: 0,
    permHero: baseHeroStats(),   // 훈련소 영구 강화 (한 판 내내 유지, 캠프에도 안 지워짐)
    trainCounts: {},             // 훈련소 스킬별 구매 횟수 (가격 = 50 x 2^횟수)
    barricadeHp: CONFIG.barricadeMaxHp,
    playerX: W / 2,
    fireCooldown: 0,
    bullets: [],
    zombies: [],
    cars: [],
    carSeq: 0,
    drones: [],          // 드라이버 강화: 드론
    gluePots: [],        // 의무병 접착 물약 (비행 중)
    glueZones: [],       // 의무병 접착 지역 (착지 후)
    medBuff: null,       // 아드레날린/도파민 버프 { kind, t }
    companions: [],      // 출전 중 (최대 4)
    reserve: [],         // 숙소 대기
    spawnQueue: 0,
    spawnTimer: 0,
    killCount: 0,
    hitFlash: 0,
    particles: [],
    effects: [],         // 체인/폭발/스윙 이펙트
    pushWave: null,      // 의무병 패시브 충격파 (바리케이드→위로 전진하는 파동)
    ghost: null,         // 본관 창문의 귀신 (이스터에그)
    ghostCd: 6 + Math.random() * 12,
    equippedSkill: null, // 게임 동아리 특수 스킬 (id, 하나만 장착)
    skillCd: 0,
    warden: false,       // 사감 고용 여부 (동료 강화 공격 활성화)
    laserT: 0,           // 레이저 남은 시간
    laserBeam: null,     // 레이저 빔 좌표 (그리기용)
    bikerGang: null,     // 폭주족 출격 대기열
    carpet: null,        // 융단 폭격 진행 상태
    overload: null,      // 과부하 방전 진행 상태
    homerunT: 0,         // 투런 홈런 버프 남은 시간 (야구부 3배)
    soccerRushT: 0,      // 역전승 버프 남은 시간 (축구부)
    skillBanner: null,   // 특수 스킬 발동 배너 { text, color, life }
  };
  resetHeroStats();
}

// 출전 동료들의 자리(x)를 다시 배정 — 뛰어다니는 동료는 시작 위치만 받음
const SLOT_X = [0.15, 0.38, 0.62, 0.85];
function assignSlots() {
  game.companions.forEach((comp, i) => {
    comp.x = W * SLOT_X[i % SLOT_X.length];
  });
}

/* ================================================================
   [5] 웨이브 — 챕터별 난이도 재시작 (11웨이브=5단계, 21웨이브=10단계)
   ================================================================ */
function diffOf(n) {
  // 난이도 = 웨이브 번호 (1~30 직선 상승).
  // 훈련소/공업 영구 성장이 생겨 챕터별 하향(11→5, 21→10)은 제거.
  return n;
}

function startWave(n) {
  game.wave = n;
  const d = diffOf(n);
  game.spawnQueue = Math.min(250, Math.floor(3 + d * 1.3) * 5);   // 무한 모드 성능 보호 상한
  game.spawnTimer = 0.3;
}

function spawnZombie() {
  const d = diffOf(game.wave);
  const big = d >= 4 && Math.random() < Math.min(0.22, 0.05 + d * 0.005);
  const hpBase = Math.max(4, Math.round((14 + d * 3 + d * d * 0.15) / 3));
  // 몰려오는 방향: 학교 정문(왼쪽) 또는 본관(오른쪽) 두 갈래
  const lane = Math.random() < 0.5 ? W * 0.25 : W * 0.75;
  const x = Math.max(45, Math.min(W - 45, lane + (Math.random() - 0.5) * W * 0.4));
  game.zombies.push({
    x,
    y: -30 - Math.random() * 40,
    hp:    big ? hpBase * 3 : hpBase,
    maxHp: big ? hpBase * 3 : hpBase,
    speed: Math.min(90, (big ? 24 : 38) + d * 0.5 + Math.random() * 10),   // 속도 원복
    size:  big ? 30 : 17,
    big,
    attackTimer: 0,
    lastCarId: 0,
    ballCd: 0,       // 축구공 피격 쿨다운
    wobble: Math.random() * Math.PI * 2,
  });
}

/* ================================================================
   [6] 캔버스 / 입력
   ================================================================ */
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
let scale = 1;
function resizeCanvas() {
  const dpr = window.devicePixelRatio || 1;
  scale = Math.min(window.innerWidth / W, window.innerHeight / H);
  canvas.style.width  = W * scale + "px";
  canvas.style.height = H * scale + "px";
  canvas.width  = W * scale * dpr;
  canvas.height = H * scale * dpr;
  ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);
}
window.addEventListener("resize", resizeCanvas);
resizeCanvas();

function pointerLogical(e) {
  const rect = canvas.getBoundingClientRect();
  const cx = e.touches ? e.touches[0].clientX : e.clientX;
  const cy = e.touches ? e.touches[0].clientY : e.clientY;
  return { x: (cx - rect.left) / scale, y: (cy - rect.top) / scale };
}

let dragging = false;
function onPointerDown(e) {
  if (game.state === "camp") return;   // 캠프 탭은 아래 click 핸들러에서 처리
  dragging = true;
  onPointerMove(e);
}
function onPointerMove(e) {
  if (!dragging || !game.running || game.state !== "battle") return;
  const p = pointerLogical(e);
  game.playerX = Math.max(40, Math.min(W - 40, p.x));
}
function onPointerUp() { dragging = false; }
canvas.addEventListener("mousedown", onPointerDown);
canvas.addEventListener("mousemove", onPointerMove);
window.addEventListener("mouseup", onPointerUp);
canvas.addEventListener("touchstart", onPointerDown, { passive: true });
canvas.addEventListener("touchmove", onPointerMove, { passive: true });
window.addEventListener("touchend", onPointerUp);
// 캠프 건물 탭: click 시점에 처리 — touchstart로 열면 뒤따라오는
// 합성 click이 방금 뜬 팝업의 배경을 때려 즉시 닫히는 버그가 생김
canvas.addEventListener("click", (e) => {
  if (game.state !== "camp") return;
  const p = pointerLogical(e);
  campTap(p.x, p.y);
});

/* ================================================================
   [7] 편의 기능
   ================================================================ */
const speedBtn = document.getElementById("speed-btn");
speedBtn.onclick = () => {
  gameSpeed = gameSpeed === 1 ? 2 : 1;
  speedBtn.textContent = "x" + gameSpeed;
  speedBtn.classList.toggle("on", gameSpeed === 2);
};
const fsBtn = document.getElementById("fs-btn");
fsBtn.onclick = () => {
  if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(() => {});
  else document.exitFullscreen();
};
const pauseBadge = document.getElementById("pause-badge");
document.addEventListener("visibilitychange", () => {
  pausedByHide = document.hidden;
  pauseBadge.style.display = (pausedByHide && game.running) ? "flex" : "none";
});
pauseBadge.onclick = () => { pausedByHide = false; pauseBadge.style.display = "none"; };

/* ================================================================
   [8] 업데이트 (전투)
   ================================================================ */
function update(dt) {
  // 스폰 — 물량전이라 간격도 1/5
  if (game.spawnQueue > 0) {
    game.spawnTimer -= dt;
    if (game.spawnTimer <= 0) {
      spawnZombie();
      game.spawnQueue--;
      game.spawnTimer = Math.max(0.06, (1.3 - diffOf(game.wave) * 0.03) / 5);
    }
  }

  // 주인공 자동 공격: 매 발사마다 방어선 최근접 적을 다시 조준
  game.fireCooldown -= dt;
  if (game.fireCooldown <= 0 && game.zombies.length > 0) {
    let target = null;
    for (const z of game.zombies) if (!target || z.y > target.y) target = z;
    fireAt(target);
    const adren = game.medBuff && game.medBuff.kind === "adrenaline" ? 1.5 : 1;
    game.fireCooldown = CONFIG.baseFireInterval / (Math.max(0.3, stats.fireRateMul) * adren);
  }

  // 동료 행동 (출전 중인 4명만)
  for (const comp of game.companions) comp.def.update(comp, dt);

  // 게임 동아리 특수 스킬: 쿨다운 자동 발동 (조건 미충족 시 쿨 소모 없음)
  if (game.equippedSkill) {
    game.skillCd -= dt;
    if (game.skillCd <= 0) {
      const sk = SPECIAL_SKILLS.find(s => s.id === game.equippedSkill);
      if (sk && sk.run()) {
        game.skillCd = sk.cd;
        // 발동 배너: 바리케이드 왼쪽 위에 잠깐 표시
        const def = COMPANION_DEFS.find(d => d.name === sk.owner);
        game.skillBanner = { text: `${sk.name}!`, color: def ? def.color : "#e8e3d8", life: 1.4 };
      }
    }
  }
  if (game.skillBanner) {
    game.skillBanner.life -= dt;
    if (game.skillBanner.life <= 0) game.skillBanner = null;
  }

  // --- 지속형 특수 스킬 처리 ---
  // [레이저] 최대 체력 적을 실시간 추적, 빔 선상의 모든 적에게 도트 피해
  if (game.laserT > 0) {
    game.laserT -= dt;
    let t = null;
    for (const z of game.zombies) if (!t || z.hp > t.hp) t = z;
    if (t) {
      const sn = game.companions.find(c => c.def.id === "sniper");
      const ox = sn ? sn.x : W / 2, oy = CONFIG.playerY - 14;
      game.laserBeam = { x0: ox, y0: oy, x1: t.x, y1: t.y };
      for (let j = game.zombies.length - 1; j >= 0; j--) {
        const z = game.zombies[j];
        if (distToSeg(z.x, z.y, ox, oy, t.x, t.y) < z.size + 8) {
          z.hp -= 40 * dt;   // 초당 40 도트
          if (z.hp <= 0) killZombie(j);
        }
      }
    } else {
      game.laserBeam = null;
    }
    if (game.laserT <= 0) game.laserBeam = null;
  }
  // [폭주족] 선택된 절반 구역에 0.5초 간격으로 차량 12대 출격
  if (game.bikerGang) {
    const bg2 = game.bikerGang;
    bg2.timer -= dt;
    if (bg2.timer <= 0 && bg2.count > 0) {
      const kinds = ["bike", "sedan", "truck", "bus"];
      const x = bg2.left
        ? 30 + Math.random() * (W / 2 - 60)
        : W / 2 + 30 + Math.random() * (W / 2 - 60);
      game.cars.push({ x, y: CONFIG.barricadeY - 20, speed: 420, dmg: 32, id: ++game.carSeq, kind: kinds[(12 - bg2.count) % 4] });
      bg2.count--;
      bg2.timer = 0.5;
    }
    if (bg2.count <= 0) game.bikerGang = null;
  }
  // [융단 폭격] 5초간 초당 8발 무작위 폭격
  if (game.carpet) {
    game.carpet.t -= dt;
    game.carpet.acc += dt * 8;
    while (game.carpet.acc >= 1) {
      game.carpet.acc -= 1;
      explode(50 + Math.random() * (W - 100), 60 + Math.random() * 440, 50, 14, false);
    }
    if (game.carpet.t <= 0) game.carpet = null;
  }
  // [과부하 방전] 3초간 화면 전체 감전 — 0.25초마다 틱 피해 + 전기 라인
  if (game.overload) {
    game.overload.t -= dt;
    game.overload.tick -= dt;
    if (game.overload.tick <= 0) {
      game.overload.tick = 0.25;
      for (let j = game.zombies.length - 1; j >= 0; j--) {
        game.zombies[j].hp -= 3;   // 3초간 총 36 피해
        if (game.zombies[j].hp <= 0) killZombie(j);
      }
      // 무작위 전기 라인 2줄
      for (let i = 0; i < 2 && game.zombies.length > 0; i++) {
        const z = game.zombies[Math.floor(Math.random() * game.zombies.length)];
        game.effects.push({ type: "chain", pts: [{ x: z.x, y: -10 }, { x: z.x, y: z.y }], life: 0.12 });
      }
    }
    if (game.overload.t <= 0) game.overload = null;
  }
  // [투런 홈런] 버프 타이머
  if (game.homerunT > 0) game.homerunT -= dt;
  // [역전승] 버프 타이머 — 종료 시 임시 공 소멸
  if (game.soccerRushT > 0) {
    game.soccerRushT -= dt;
    if (game.soccerRushT <= 0) {
      for (const c of allOwned()) {
        if (c.def.id === "soccer" && c.balls) c.balls = c.balls.filter(b => !b.temp);
      }
    }
  }

  // 탄환
  for (let i = game.bullets.length - 1; i >= 0; i--) {
    const b = game.bullets[i];
    b.x += b.vx * dt; b.y += b.vy * dt;
    if (b.y < -40 || b.y > H + 40 || b.x < -40 || b.x > W + 40) {
      game.bullets.splice(i, 1); continue;
    }
    // ★ 시너지: 폭탄병의 폭탄이 드라이버의 차량에 맞으면 차량 즉시 유폭!
    //   피해 = 폭탄병 피해 + 차량 피해, 범위 = 화면 가로 1/4 고정 원형
    if (b.bomb) {
      let hitCar = false;
      for (let k = game.cars.length - 1; k >= 0; k--) {
        const car = game.cars[k];
        if (Math.abs(b.x - car.x) < 24 && Math.abs(b.y - car.y) < 36) {
          explode(car.x, car.y, W * 0.3, b.damage + car.dmg, false, true);
          game.cars.splice(k, 1);
          game.bullets.splice(i, 1);
          hitCar = true;
          break;
        }
      }
      if (hitCar) continue;
    }
    for (let j = game.zombies.length - 1; j >= 0; j--) {
      const z = game.zombies[j];
      const dx = b.x - z.x, dy = b.y - z.y;
      const hitR = z.size + 5 * (b.wide || 1);
      if (dx * dx + dy * dy < hitR * hitR) {
        if (b.kiwave) {
          // 기공파: 착탄 지점에 원형 폭발 + 넉백
          game.effects.push({ type: "boltburst", x: b.x, y: b.y, r: b.radius, life: 0.3 });
          const kr2 = b.radius * b.radius;
          for (let k = game.zombies.length - 1; k >= 0; k--) {
            const zz = game.zombies[k];
            const kdx = zz.x - b.x, kdy = zz.y - b.y, kd2 = kdx * kdx + kdy * kdy;
            if (kd2 < kr2) {
              zz.hp -= b.dmg;
              const kd = Math.sqrt(kd2) || 1;
              zz.x += (kdx / kd) * b.knock;
              zz.y += (kdy / kd) * b.knock;
              if (zz.hp <= 0) killZombie(k);
            }
          }
          game.bullets.splice(i, 1);
          break;
        } else if (b.bomb) {
          explode(b.x, b.y, b.radius, b.damage, true);   // 폭탄 폭발 → 범위 내 차량 유폭 가능
          game.bullets.splice(i, 1);
          break;
        } else if (b.baseball) {
          // 야구공: 전부 관통(장외까지 직진), 같은 적은 한 번만 타격
          if (!b.hitSet.has(z)) {
            b.hitSet.add(z);
            z.hp -= b.damage;
            spawnParticles(z.x, z.y, "#f0e6d0", 3);
            if (z.hp <= 0) killZombie(j);
          }
          continue;   // break 없이 경로상의 다음 적도 검사
        } else {
          z.hp -= b.damage !== undefined ? b.damage : CONFIG.baseDamage * stats.damageMul * (1 + 0.2 * game.campAtk);
          z.y -= stats.knockback;
          spawnParticles(z.x, z.y, "#c33b2e", 2);
          // 저격수 강화: 명중 지점에 번개 폭발 (탄 피해와 동일, 소형 범위)
          if (b.sniperBolt) {
            const br = 46;   // 번개 범위
            game.effects.push({ type: "boltburst", x: b.x, y: b.y, r: br, life: 0.22 });
            const br2 = br * br;
            for (let k = game.zombies.length - 1; k >= 0; k--) {
              const zz = game.zombies[k];
              if (zz === z) continue;
              const ddx = zz.x - b.x, ddy = zz.y - b.y;
              if (ddx * ddx + ddy * ddy < br2) {
                zz.hp -= b.sniperBolt;
                if (zz.hp <= 0) killZombie(k);
              }
            }
            b.sniperBolt = 0;   // 1회만
          }
          if (--b.hitsLeft <= 0) game.bullets.splice(i, 1);
          if (z.hp <= 0) killZombie(j);
          break;
        }
      }
    }
  }

  // 차량: 아래→위 돌진
  for (let i = game.cars.length - 1; i >= 0; i--) {
    const car = game.cars[i];
    car.y -= car.speed * dt;
    for (let j = game.zombies.length - 1; j >= 0; j--) {
      const z = game.zombies[j];
      if (z.lastCarId === car.id) continue;
      if (Math.abs(car.x - z.x) < (car.w || 30) + z.size && Math.abs(car.y - z.y) < 34) {
        z.lastCarId = car.id;
        z.hp -= car.dmg;
        z.y -= 20;
        spawnParticles(z.x, z.y, "#c9884a", 4);
        if (z.hp <= 0) killZombie(j);
      }
    }
    if (car.y < -60) game.cars.splice(i, 1);
  }

  // 드론 (드라이버 강화): 목표 지점까지 비행하며 0.3초마다 최근접 적 직접 타격, 착지 시 폭발
  for (let i = game.drones.length - 1; i >= 0; i--) {
    const dr = game.drones[i];
    if (!dr.landed) {
      const dx = dr.tx - dr.x, dy = dr.ty - dr.y;
      const dist = Math.hypot(dx, dy) || 1;
      const spd = 175 * dt;   // 기공사 이동(350)의 절반
      if (dist <= spd) { dr.x = dr.tx; dr.y = dr.ty; dr.landed = true; dr.holdT = 0; }
      else { dr.x += (dx / dist) * spd; dr.y += (dy / dist) * spd; }
      // 비행 중 공격 (총알 착탄 효과)
      dr.atkCd -= dt;
      if (dr.atkCd <= 0 && game.zombies.length > 0) {
        let t = null, bd = Infinity;
        for (const z of game.zombies) {
          const zd = (z.x - dr.x) ** 2 + (z.y - dr.y) ** 2;
          if (zd < bd) { bd = zd; t = z; }
        }
        if (t) {
          t.hp -= dr.dmg;
          // 드론 → 타겟으로 짧은 사격 라인 + 착탄 섬광
          game.effects.push({ type: "droneshot", x0: dr.x, y0: dr.y, x1: t.x, y1: t.y, life: 0.1 });
          game.effects.push({ type: "impact", x: t.x, y: t.y, life: 0.14 });
          spawnParticles(t.x, t.y, "#ffd47a", 3);
          if (t.hp <= 0) killZombie(game.zombies.indexOf(t));
        }
        dr.atkCd = 0.3;
      }
    } else {
      // 착지 후 잠깐 머물며 계속 공격하다 폭발
      dr.holdT += dt;
      dr.atkCd -= dt;
      if (dr.atkCd <= 0 && game.zombies.length > 0) {
        let t2 = null, bd2 = Infinity;
        for (const z of game.zombies) {
          const zd = (z.x - dr.x) ** 2 + (z.y - dr.y) ** 2;
          if (zd < bd2) { bd2 = zd; t2 = z; }
        }
        if (t2) {
          t2.hp -= dr.dmg;
          game.effects.push({ type: "droneshot", x0: dr.x, y0: dr.y, x1: t2.x, y1: t2.y, life: 0.1 });
          game.effects.push({ type: "impact", x: t2.x, y: t2.y, life: 0.14 });
          if (t2.hp <= 0) killZombie(game.zombies.indexOf(t2));
        }
        dr.atkCd = 0.3;
      }
      if (dr.holdT > 0.8) {
        explode(dr.x, dr.y, W / 4, dr.dmg * 2, false);
        game.drones.splice(i, 1);
      }
    }
  }

  // 의무병 접착 물약: 포물선 비행 → 착지 시 접착 지역 생성
  for (let i = game.gluePots.length - 1; i >= 0; i--) {
    const p = game.gluePots[i];
    p.t += dt;
    const r = Math.min(1, p.t / p.flightT);
    p.x = p.sx + (p.tx - p.sx) * r;
    p.y = p.sy + (p.ty - p.sy) * r - Math.sin(r * Math.PI) * 90;   // 포물선 아치
    if (r >= 1) {
      game.glueZones.push({ x: p.tx, y: p.ty, r: Math.sqrt(W * H / 4) / 4, t: 3 });
      game.gluePots.splice(i, 1);
    }
  }
  // 접착 지역: 3초 유지, 내부 적 이동 감속(50%)
  for (let i = game.glueZones.length - 1; i >= 0; i--) {
    const gz = game.glueZones[i];
    gz.t -= dt;
    if (gz.t <= 0) { game.glueZones.splice(i, 1); continue; }
    const gr2 = gz.r * gz.r;
    for (const z of game.zombies) {
      const dx = z.x - gz.x, dy = z.y - gz.y;
      if (dx * dx + dy * dy < gr2) z.glued = 0.1;   // 다음 이동에서 감속 적용
    }
  }
  // 의무병 버프(아드레날린/도파민) 타이머
  if (game.medBuff) {
    game.medBuff.t -= dt;
    if (game.medBuff.t <= 0) game.medBuff = null;
  }
  // 파동보다 아래에 있는 적을 파면 위로 쓸어올림
  if (game.pushWave) {
    const waveSpeed = (CONFIG.barricadeY - H * 0.5) / 0.45;   // 약 0.45초에 도달
    game.pushWave.y -= waveSpeed * dt;
    for (const z of game.zombies) {
      if (z.y > game.pushWave.y) z.y = game.pushWave.y;
    }
    if (game.pushWave.y <= H * 0.5) game.pushWave = null;
  }

  // 좀비 전진
  for (let i = game.zombies.length - 1; i >= 0; i--) {
    const z = game.zombies[i];
    z.wobble += dt * 7;
    if (z.ballCd > 0) z.ballCd -= dt;
    const glueMul = z.glued > 0 ? 0.5 : 1;   // 접착 지역: 이동 절반
    if (z.glued > 0) z.glued -= dt;
    if (z.y < CONFIG.barricadeY - z.size - 8) {
      z.y += z.speed * glueMul * dt;
    } else {
      z.attackTimer -= dt;
      if (z.attackTimer <= 0) {
        game.barricadeHp -= z.big ? 4 : 1;   // 물량전이라 개별 피해 하향
        game.hitFlash = 0.2;
        z.attackTimer = 1.0;
        if (stats.thorns > 0) {
          z.hp -= 6 * stats.thorns;
          if (z.hp <= 0) { killZombie(i); continue; }
        }
      }
    }
  }

  // 파티클 / 이펙트 / 플래시
  for (let i = game.particles.length - 1; i >= 0; i--) {
    const p = game.particles[i];
    p.x += p.vx * dt; p.y += p.vy * dt; p.life -= dt;
    if (p.life <= 0) game.particles.splice(i, 1);
  }
  for (let i = game.effects.length - 1; i >= 0; i--) {
    game.effects[i].life -= dt;
    if (game.effects[i].life <= 0) game.effects.splice(i, 1);
  }
  if (game.hitFlash > 0) game.hitFlash -= dt;

  // 본관 창문의 귀신 (이스터에그): 불 켜진 창문 4곳 중 한 곳에
  // 8~22초 간격으로 0.5초간 사람 형상이 스쳐 지나감
  game.ghostCd -= dt;
  if (game.ghost) {
    game.ghost.life -= dt;
    if (game.ghost.life <= 0) game.ghost = null;
  } else if (game.ghostCd <= 0) {
    const LIT_WINDOWS = [[350, 50], [375, 50], [325, 76], [375, 76]];
    const w = LIT_WINDOWS[Math.floor(Math.random() * LIT_WINDOWS.length)];
    game.ghost = { wx: w[0], wy: w[1], life: 0.5 };
    game.ghostCd = 8 + Math.random() * 14;
  }

  // 승패 / 웨이브 종료 — 무한 모드: 클리어 조건 없이 계속 이어짐
  if (game.barricadeHp <= 0) { endGame(false); return; }
  if (game.spawnQueue === 0 && game.zombies.length === 0) {
    game.running = false;
    if (game.wave % 10 === 0) enterCamp();
    else showCardChoices();
  }
}

// 폭발: 반경 내 모든 적에게 피해.
// fromBomb=true(폭탄병의 폭탄)일 때는 폭발 범위에 닿은 차량도 유폭시킴 (시너지)
// carBlast=true(차량 유폭)일 때는 훨씬 진한 화염 이펙트를 사용
function explode(x, y, radius, dmg, fromBomb, carBlast) {
  if (carBlast) {
    game.effects.push({ type: "carboom", x, y, r: radius, life: 0.4 });
    spawnParticles(x, y, "#e8975a", 12);
    spawnParticles(x, y, "#c33b2e", 8);
  } else {
    game.effects.push({ type: "boom", x, y, r: radius, life: 0.25 });
  }
  const r2 = radius * radius;
  for (let j = game.zombies.length - 1; j >= 0; j--) {
    const z = game.zombies[j];
    const dx = z.x - x, dy = z.y - y;
    if (dx * dx + dy * dy < r2) {
      z.hp -= dmg;
      spawnParticles(z.x, z.y, "#b5533c", 3);
      if (z.hp <= 0) killZombie(j);
    }
  }
  // ★ 유폭: 폭탄의 폭발 범위에 차량이 닿으면 그 차량도 폭발
  //   (차량 폭발끼리는 연쇄되지 않음 — 폭탄이 기폭제일 때만)
  //   유폭 범위: 화면 가로의 30% 고정 (기존 1/4에서 +20%)
  if (fromBomb) {
    for (let k = game.cars.length - 1; k >= 0; k--) {
      const car = game.cars[k];
      const dx = car.x - x, dy = car.y - y;
      if (dx * dx + dy * dy < (radius + 26) * (radius + 26)) {
        const carDmg = car.dmg;
        game.cars.splice(k, 1);
        explode(car.x, car.y, W * 0.3, dmg + carDmg, false, true);
      }
    }
  }
}

function fireAt(target) {
  const dx = target.x - game.playerX, dy = target.y - CONFIG.playerY;
  const baseAngle = Math.atan2(dy, dx);
  const n = stats.multishot;
  for (let k = 0; k < n; k++) {
    const spread = n === 1 ? 0 : (k / (n - 1) - 0.5) * 0.2;
    const a = baseAngle + spread;
    game.bullets.push({
      x: game.playerX, y: CONFIG.playerY - 14,
      vx: Math.cos(a) * CONFIG.baseBulletSpeed,
      vy: Math.sin(a) * CONFIG.baseBulletSpeed,
      hitsLeft: 1 + stats.pierce,
    });
  }
}

function killZombie(index) {
  const z = game.zombies[index];
  spawnParticles(z.x, z.y, z.big ? "#7a9e4f" : "#5b7d3c", 6);
  game.zombies.splice(index, 1);
  game.killCount++;
}

function spawnParticles(x, y, color, count) {
  // 물량전이라 파티클 총량 제한 (성능 보호)
  if (game.particles.length > 250) return;
  for (let i = 0; i < count; i++) {
    const a = Math.random() * Math.PI * 2;
    const sp = 40 + Math.random() * 120;
    game.particles.push({ x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp, life: 0.25 + Math.random() * 0.2, color });
  }
}

/* ================================================================
   [9] 카드 시스템
   - 영입: 미보유 동료 (보유 = 출전 + 대기)
   - 강화: 보유 동료의 카드 중 maxLv 미달인 것만
   - 주인공: available 조건(더블샷 5발 제한 등) 충족 카드만
   ================================================================ */
function allOwned() { return [...game.companions, ...game.reserve]; }

function buildCardPool() {
  const recruits = [];
  const others = [];
  // 출전이 4명 꽉 차면 영입 카드는 더 이상 등장하지 않음
  const canRecruit = game.companions.length < CONFIG.maxDeployed;
  for (const def of COMPANION_DEFS) {
    const owned = allOwned().find(c => c.def.id === def.id);
    const deployed = game.companions.find(c => c.def.id === def.id);
    if (!owned) {
      if (canRecruit) {
        // 의무병은 1~10웨이브에서 영입 카드 금지 (강당 합류로만 얻음)
        if (def.id === "medic" && game.wave <= 10) continue;
        recruits.push({
          tag: "동료 영입", cls: "recruit",
          name: def.name + " 영입",
          desc: def.recruitDesc,
          apply: () => recruitCompanion(def),
        });
      }
    } else if (deployed) {
      // 강화 카드는 "출전 중"인 동료만 등장 (기숙사 대기 중이면 금지)
      const allowed = def.cardFilter ? def.cardFilter(deployed) : def.upgrades.map((_, i) => i);
      def.upgrades.forEach((up, i) => {
        if (!allowed.includes(i)) return;
        const bonus = deployed.carryCard === i ? 1 : 0;   // 지참 카드는 맥스 +1
        if (deployed.upLv[i] >= up.maxLv + bonus) return;   // 맥스 도달 카드는 제외
        others.push({
          tag: `${def.name} 강화 (${deployed.upLv[i]}/${up.maxLv + bonus})`, cls: "ally",
          name: up.name, desc: up.desc,
          apply: () => { up.apply(deployed); deployed.upLv[i]++; deployed.level++; },
        });
      });
    }
  }
  // ★ 주인공 카드는 웨이브에서 등장 금지 — 강당의 개인 훈련소에서만 영구 강화
  return { recruits, others };
}

// 지참 카드 적용: 전투 시작 시 지정 카드를 1레벨 적용된 채로 시작
// 의무병은 '따라하기' — copyTarget(동료 id)이 지참한 카드를 대상에게 한 번 더 적용
function applyCarryCard(comp) {
  if (comp.def.id === "medic" && comp.copyTarget) {
    const src = allOwned().find(c => c.def.id === comp.copyTarget);
    if (!src || src.carryCard == null) return;
    const up = src.def.upgrades[src.carryCard];
    if (up) { up.apply(src); src.upLv[src.carryCard]++; }
    return;
  }
  const idx = comp.carryCard;
  if (idx == null) return;
  const up = comp.def.upgrades[idx];
  if (up) { up.apply(comp); comp.upLv[idx]++; }
}

function carryUnlocked() { return game.wave >= 20; }

function recruitCompanion(def) {
  const comp = { def, level: 1, upLv: def.upgrades.map(() => 0), x: W / 2, ...def.initState() };
  if (game.companions.length < CONFIG.maxDeployed) {
    game.companions.push(comp);
    assignSlots();
  } else {
    game.reserve.push(comp);   // 자리가 없으면 숙소 대기 (캠프에서 교체)
  }
}

const skillOverlay = document.getElementById("skill-overlay");
const skillCards = document.getElementById("skill-cards");

function showCardChoices() {
  const { recruits, others } = buildCardPool();
  const picks = [];
  if (recruits.length > 0) {
    picks.push(recruits.splice(Math.floor(Math.random() * recruits.length), 1)[0]);
  }
  const pool = [...recruits, ...others];
  while (picks.length < 3 && pool.length > 0) {
    picks.push(pool.splice(Math.floor(Math.random() * pool.length), 1)[0]);
  }
  // 모든 강화가 맥스라 보여줄 카드가 없으면 바로 다음 웨이브로
  if (picks.length === 0) {
    startWave(game.wave + 1);
    game.running = true;
    return;
  }
  skillCards.innerHTML = "";
  skillCards.style.display = "flex";
  skillCards.style.flexDirection = "column";
  skillCards.style.gap = "10px";
  picks.forEach(card => {
    const el = document.createElement("div");
    el.className = "skill-card " + card.cls;
    el.innerHTML = `<div class="tag">${card.tag}</div><div class="name">${card.name}</div><div class="desc">${card.desc}</div>`;
    el.onclick = () => {
      card.apply();
      skillOverlay.style.display = "none";
      startWave(game.wave + 1);
      game.running = true;
    };
    skillCards.appendChild(el);
  });
  skillOverlay.style.display = "flex";
}

/* ================================================================
   [10] 캠프 — 캔버스로 그리는 장면 + 시설 터치
   ----------------------------------------------------------------
   위: 바리케이드 / 중앙: 마을 회관 / 좌하: 임시 의무대 / 우하: 숙소
   시설을 탭하면 패널이 열립니다. 하단의 [출정] 탭으로 재출발.
   ================================================================ */
const CAMP_ZONES = {
  hall:   { x: W / 2 - 56, y: 32,  w: 112, h: 72 },    // 2층 중앙 방송실 부스
  medic:  { x: 28,         y: 142, w: 364, h: 86 },    // 무대 위 임시 양호실
  club:   { x: 16,         y: 296, w: 118, h: 110 },   // 코트 왼쪽 중간 (게임 동아리)
  train:  { x: 12,         y: 540, w: 126, h: 112 },   // 1층 구석 방 (개인 훈련소)
  lodge:  { x: 286,        y: 424, w: 124, h: 146 },   // 코트 한쪽 침낭 (임시 기숙사)
  warden: { x: 286,        y: 300, w: 124, h: 108 },   // 기숙사 옆 (사감/체육 선생님)
  depart: { x: W / 2 - 80, y: 660, w: 160, h: 52 },
};

function enterCamp() {
  game.state = "camp";
  game.barricadeHp = CONFIG.barricadeMaxHp;   // 도착하며 기본 정비
  resetHeroStats();                            // 주인공은 훈련소 영구 강화만 유지
  // ★ 동료들도 전투 강화 전부 초기화 (영입/출전/지참 카드 상태는 유지)
  //   지참 카드는 출정(departCamp) 시점에 적용되므로 여기선 초기화만.
  for (const comp of allOwned()) {
    const carry = comp.carryCard, copyT = comp.copyTarget;
    Object.assign(comp, comp.def.initState());
    comp.upLv = comp.def.upgrades.map(() => 0);
    comp.level = 1;
    comp.carryCard = carry;
    comp.copyTarget = copyT;
  }
  game.bullets = []; game.cars = []; game.particles = []; game.effects = [];
  game.drones = [];
  game.gluePots = []; game.glueZones = []; game.medBuff = null;
  game.pushWave = null;
  game.laserT = 0; game.laserBeam = null;
  game.bikerGang = null; game.carpet = null; game.overload = null;
  game.homerunT = 0; game.soccerRushT = 0;
  // 날이 밝자, 안전한 캠프가 있다는 소문을 듣고 남은 동료들이 전부 합류
  const joined = [];
  for (const def of COMPANION_DEFS) {
    if (!allOwned().find(c => c.def.id === def.id)) {
      recruitCompanion(def);   // 출전에 자리가 있으면 배치, 없으면 임시 기숙사 대기
      joined.push(def.name);
    }
  }
  game.campNotice = joined.length > 0 ? "소문을 듣고 합류: " + joined.join(", ") : "";
}

function campTap(x, y) {
  const hit = (z) => x >= z.x && x <= z.x + z.w && y >= z.y && y <= z.y + z.h;
  if (hit(CAMP_ZONES.hall))   { openFacility("hall"); return; }
  if (hit(CAMP_ZONES.medic))  { openFacility("medic"); return; }
  if (hit(CAMP_ZONES.club))   { openClub(); return; }
  if (game.wave >= 10 && hit(CAMP_ZONES.warden)) { openWarden(); return; }
  if (hit(CAMP_ZONES.train))  { openTrain(); return; }
  if (hit(CAMP_ZONES.lodge))  { openLodge(); return; }
  if (hit(CAMP_ZONES.depart)) { departCamp(); return; }
}

function departCamp() {
  // 지참 카드/따라하기를 출정 시점에 적용 (캠프에서 방금 고른 선택 반영)
  for (const comp of allOwned()) {
    const carry = comp.carryCard, copyT = comp.copyTarget;
    Object.assign(comp, comp.def.initState());
    comp.upLv = comp.def.upgrades.map(() => 0);
    comp.level = 1;
    comp.carryCard = carry;
    comp.copyTarget = copyT;
  }
  for (const comp of allOwned()) if (comp.def.id !== "medic") applyCarryCard(comp);
  for (const comp of allOwned()) if (comp.def.id === "medic") applyCarryCard(comp);
  game.state = "battle";
  startWave(game.wave + 1);
  game.running = true;
}

      const sub = document.createElement("div");
      sub.className = "tdesc";
      sub.textContent = "따라하기 — 동료를 선택하면 그 동료의 지참 카드를 한 번 더 적용";
      wrap.appendChild(sub);
      const others = game.companions.filter(c => c.def.id !== "medic");
      for (const oc of others) {
        const btn = document.createElement("button");
        btn.className = "train-buy" + (comp.copyTarget === oc.def.id ? " equipped" : "");
        btn.style.cssText = "display:block; width:100%; margin-top:4px";
        btn.textContent = (comp.copyTarget === oc.def.id ? "✓ " : "") + oc.def.name + " 따라하기";
        btn.onclick = () => { comp.copyTarget = comp.copyTarget === oc.def.id ? null : oc.def.id; refreshCarry(); };

    } else {
      def.upgrades.forEach((up, i) => {

        btn.style.cssText = "display:block; width:100%; margin-top:4px";
        btn.textContent = (comp.carryCard === i ? "✓ " : "") + up.name.split(": ").pop();
        btn.onclick = () => { comp.carryCard = comp.carryCard === i ? null : i; refreshCarry(); };
        wrap.appendChild(btn);
      });
    }
    list.appendChild(wrap);
  }
}

// 기(차크라) 연출: 스킬 발동 순간, 해당 동료에게서 기둥이 하늘로 솟음
function kiBurst(defId) {
  const def = COMPANION_DEFS.find(d => d.id === defId);
  const comp = game.companions.find(c => c.def.id === defId);
  game.effects.push({
    type: "ki",
    x: comp ? comp.x : W / 2,
    y: CONFIG.playerY,
    color: def ? def.color : "#e8e3d8",
    life: 0.5,
  });
}

  trainKills.textContent = game.killCount;

    const cnt = game.trainCounts[sk.name] || 0;
    const cost = 50;   // 균일가 (가격 배증 삭제 — 난이도 조정)
    const maxed = (sk.trainMax && cnt >= sk.trainMax) ||
                  (sk.available && !sk.available(game.permHero));

function rosterRow(comp, action) {
  const el = document.createElement("div");
  el.className = "roster-row";
  el.innerHTML = `<span class="rname" style="color:${comp.def.color}">${comp.def.name}</span>
    <span class="rlv">Lv ${comp.level}</span>
    <span class="rmove">${action === "bench" ? "대기로 ▼" : "출전 ▲"}</span>`;
  el.onclick = () => {
    if (action === "bench") {
      game.companions.splice(game.companions.indexOf(comp), 1);
      game.reserve.push(comp);
    } else {
      if (game.companions.length >= CONFIG.maxDeployed) return;
      game.reserve.splice(game.reserve.indexOf(comp), 1);
      game.companions.push(comp);
    }
    assignSlots();
    refreshLodge();
  };
  return el;
}

  if (game.reserve.length === 0) reserveList.innerHTML = `<div class="roster-empty">대기 중인 동료가 없습니다</div>`;
  game.companions.forEach(c => deployedList.appendChild(rosterRow(c, "bench")));

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0b0d10">
<title>SURVIVAL TD</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    background: #0b0d10;
    font-family: 'Segoe UI', 'Malgun Gothic', sans-serif;
    overflow: hidden;
    touch-action: none;
  }
  #game-wrap {
    position: relative; width: 100%; height: 100%;
    display: flex; justify-content: center; align-items: center;
  }
  canvas { display: block; background: #14181d; max-width: 100%; max-height: 100%; }

  #util-bar {
    position: absolute; top: 96px; right: 8px;
    display: flex; flex-direction: column; gap: 8px; z-index: 5;
  }
  .util-btn {
    width: 44px; height: 44px; border-radius: 10px;
    border: 1px solid #3a4350; background: rgba(20,24,29,0.85);
    color: #e8e3d8; font-size: 14px; font-weight: 700; cursor: pointer;
  }
  .util-btn.on { border-color: #c33b2e; color: #ff8a7a; }

  /* ---- 카드 선택 ---- */
  #skill-overlay {
    position: absolute; inset: 0;
    background: rgba(5,6,8,0.84);
    display: none; flex-direction: column;
    justify-content: center; align-items: center;
    gap: 14px; z-index: 10;
  }
  #skill-overlay h2 { color: #e8e3d8; font-size: 20px; letter-spacing: 2px; }
  #skill-overlay .sub { color: #8a8577; font-size: 13px; margin-bottom: 8px; }
  .skill-card {
    width: min(330px, 88vw);
    background: linear-gradient(160deg, #1d232b, #12161b);
    border: 1px solid #3a4350; border-radius: 10px;
    padding: 13px 15px; cursor: pointer;
    transition: transform .12s;
  }
  .skill-card:active { transform: scale(0.97); }
  .skill-card.hero    { border-left: 4px solid #c33b2e; }
  .skill-card.recruit { border-left: 4px solid #d9a441; }
  .skill-card.ally    { border-left: 4px solid #4f7fae; }
  .skill-card .tag  { font-size: 11px; font-weight: 700; letter-spacing: 1px; }
  .skill-card.hero    .tag { color: #e06a5c; }
  .skill-card.recruit .tag { color: #d9a441; }
  .skill-card.ally    .tag { color: #6fa3d4; }
  .skill-card .name { color: #f0ece1; font-size: 16px; font-weight: 700; margin-top: 2px; }
  .skill-card .desc { color: #9aa3ad; font-size: 13px; margin-top: 3px; line-height: 1.4; }

  /* ---- 시작 / 게임오버 ---- */
  #center-overlay {
    position: absolute; inset: 0;
    background: rgba(5,6,8,0.88);
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    gap: 16px; z-index: 20; text-align: center;
  }
  #center-overlay h1 { color: #e8e3d8; font-size: 30px; letter-spacing: 4px; }
  #center-overlay h1 span { color: #c33b2e; }
  #center-overlay p { color: #8a8577; font-size: 14px; line-height: 1.7; padding: 0 24px; }
  #center-overlay button {
    background: #c33b2e; color: #fff; border: none;
    font-size: 17px; font-weight: 700; letter-spacing: 2px;
    padding: 13px 46px; border-radius: 8px; cursor: pointer;
  }
  #center-overlay button:active { transform: scale(0.96); }

  #pause-badge {
    position: absolute; inset: 0; display: none;
    justify-content: center; align-items: center;
    background: rgba(5,6,8,0.6);
    color: #e8e3d8; font-size: 22px; letter-spacing: 4px; z-index: 15;
  }

  /* ---- 캠프 시설 패널 (마을회관 / 의무대 공용) ---- */
  #facility-panel {
    position: absolute; inset: 0;
    background: rgba(5,6,8,0.8);
    display: none; flex-direction: column;
    justify-content: center; align-items: center;
    gap: 12px; z-index: 25; text-align: center;
  }
  .fac-box {
    width: min(320px, 86vw);
    background: linear-gradient(160deg, #241e14, #17130d);
    border: 1px solid #5a4c34;
    border-radius: 12px;
    padding: 20px 18px;
  }
  .fac-box h3 { color: #e8d9b8; font-size: 19px; margin-bottom: 6px; }
  .fac-box .desc { color: #9aa3ad; font-size: 13px; line-height: 1.6; margin-bottom: 14px; }
  .fac-box .kills { color: #d9a441; font-weight: 700; }
  .fac-action {
    width: 100%;
    background: #6b5a3e; color: #f0ece1;
    border: 1px solid #8a7550; border-radius: 8px;
    font-size: 15px; font-weight: 700;
    padding: 12px; cursor: pointer;
  }
  .fac-action:disabled { opacity: 0.4; }
  .fac-action:active:not(:disabled) { transform: scale(0.97); }
  .fac-close {
    background: none; border: none;
    color: #8a8577; font-size: 14px;
    padding: 10px; cursor: pointer; text-decoration: underline;
  }

  /* ---- 숙소: 동료 교체 ---- */
  #lodge-panel {
    position: absolute; inset: 0;
    background: rgba(5,6,8,0.85);
    display: none; flex-direction: column;
    justify-content: center; align-items: center;
    gap: 10px; z-index: 25;
  }
  #lodge-panel h3 { color: #e8d9b8; font-size: 19px; }
  #lodge-panel .hint { color: #8a8577; font-size: 12px; margin-bottom: 4px; }
  .lodge-section {
    width: min(330px, 88vw);
    background: rgba(20,24,29,0.9);
    border: 1px solid #4a4030; border-radius: 12px;
    padding: 12px;
  }
  .lodge-section .sec-title { color: #d9a441; font-size: 13px; font-weight: 700; margin-bottom: 8px; }
  .roster-row {
    display: flex; align-items: center; justify-content: space-between;
    background: #1d232b; border: 1px solid #3a4350; border-radius: 8px;
    padding: 9px 12px; margin-bottom: 6px; cursor: pointer;
  }
  .roster-row:active { transform: scale(0.98); }
  .roster-row .rname { color: #f0ece1; font-size: 14px; font-weight: 700; }
  .roster-row .rlv { color: #6fa3d4; font-size: 12px; }
  .roster-row .rmove { color: #8a8577; font-size: 11px; }
  .roster-empty { color: #5a5548; font-size: 12px; padding: 6px 2px; }

  /* ---- 개인 훈련소 ---- */
  #train-panel {
    position: absolute; inset: 0;
    background: rgba(5,6,8,0.85);
    display: none; flex-direction: column;
    justify-content: center; align-items: center;
    gap: 10px; z-index: 25;
  }
  #train-panel h3 { color: #e8d9b8; font-size: 19px; }
  #train-panel .hint { color: #8a8577; font-size: 12px; margin-bottom: 4px; }
  .train-row {
    display: flex; align-items: center; justify-content: space-between;
    gap: 8px;
    background: #1d232b; border: 1px solid #3a4350; border-radius: 8px;
    padding: 9px 12px; margin-bottom: 6px;
  }
  .train-row .tname { color: #f0ece1; font-size: 14px; font-weight: 700; }
  .train-row .tdesc { color: #9aa3ad; font-size: 11px; }
  .train-buy {
    background: #6b5a3e; color: #f0ece1;
    border: 1px solid #8a7550; border-radius: 6px;
    font-size: 12px; font-weight: 700;
    padding: 8px 10px; cursor: pointer; white-space: nowrap;
  }
  .train-buy:disabled { opacity: 0.35; }
  .train-buy:active:not(:disabled) { transform: scale(0.95); }
</style>
</head>
<body>
<div id="game-wrap">
  <canvas id="game"></canvas>

  <div id="util-bar">
    <button class="util-btn" id="speed-btn">x1</button>
    <button class="util-btn" id="fs-btn">⛶</button>
  </div>

  <div id="pause-badge">PAUSED</div>

  <div id="skill-overlay">
    <h2>WAVE CLEAR</h2>
    <div class="sub">하나를 선택하세요</div>
    <div id="skill-cards"></div>
  </div>

  <!-- 마을회관 / 의무대 공용 패널 (내용은 JS가 채움) -->
  <div id="facility-panel">
    <div class="fac-box">
      <h3 id="fac-title"></h3>
      <div class="desc" id="fac-desc"></div>
      <button class="fac-action" id="fac-action"></button>
      <button class="fac-close" id="fac-close">닫기</button>
    </div>
  </div>

  <!-- 숙소 패널: 동료 교체 -->
  <div id="lodge-panel">
    <h3>🛏 임시 기숙사</h3>
    <div class="hint">탭해서 출전 ↔ 대기 전환 (출전 최대 4명)</div>
    <div class="lodge-section">
      <div class="sec-title">출전 중 (<span id="deploy-count">0</span>/4)</div>
      <div id="deployed-list"></div>
    </div>
    <div class="lodge-section">
      <div class="sec-title">대기 중</div>
      <div id="reserve-list"></div>
    </div>
    <button class="fac-close" id="lodge-close">닫기</button>
  </div>

  <!-- 개인 훈련소 패널: 주인공 영구 강화 -->
  <div id="train-panel">
    <h3>🎯 개인 훈련소</h3>
    <div class="hint">보유 킬: <span id="train-kills" style="color:#d9a441; font-weight:700">0</span> · 강화당 50킬 · <b style="color:#e06a5c">영구 유지</b> (캠프에서도 안 지워짐)</div>
    <div class="lodge-section" id="train-list"></div>
    <button class="fac-close" id="train-close">닫기</button>
  </div>

  <div id="center-overlay">
    <h1>SURVIVAL <span>TD</span></h1>
    <p id="center-text">
      정문과 본관에서 &lt;놈들&gt;이 몰려온다.<br>
      강당 앞 바리케이드를 지켜라.<br>
      드래그로 주인공을 <b>좌우</b>로 이동,<br>
      <b style="color:#d9a441">동료를 영입</b>하고 10웨이브마다 강당에서 정비하세요.
    </p>
    <button id="start-btn">전투 시작</button>
  </div>
</div>

<script>
/* ================================================================
   [0] 에셋 교체 지점 — 경로만 넣으면 도형 대신 이미지로 그립니다.
   ================================================================ */
const ASSET_URLS = {
  player: "assets/player.png",
  zombie: "assets/zombie.png",
  zombieBig: "assets/zombieBig.png",
  bullet: "",                          // 탄환은 코드 발광이 더 예뻐서 유지
  background: "assets/background.png?v=2",   // ?v=숫자: 캐시 무효화용 (이미지 교체 시 숫자 올리기)
  sniper: "assets/sniper.png",
  medic: "assets/medic.png",
  driver: "assets/driver.png",
  bomber: "assets/bomber.png",
  engineer: "assets/engineer.png",
  batter: "assets/batter.png",
  soccer: "assets/soccer.png",
  sedan: "assets/sedan.png",           // 차량 4종 (드라이버 출격)
  bike: "assets/bike.png",
  truck: "assets/truck.png",
  bus: "assets/bus.png",
  campBg: "assets/camp_bg.png",        // 강당 내부 (캠프 화면)
};
const IMAGES = {};
function preloadAssets(callback) {
  const keys = Object.keys(ASSET_URLS).filter(k => ASSET_URLS[k] !== "");
  if (keys.length === 0) { callback(); return; }
  let loaded = 0;
  keys.forEach(key => {
    const img = new Image();
    img.src = ASSET_URLS[key];
    img.onload = img.onerror = () => {
      if (img.complete && img.naturalWidth > 0) IMAGES[key] = img;
      if (++loaded === keys.length) callback();
    };
  });
}

/* ================================================================
   [1] 기본 설정
   ★ 물량전 개편: 적 수 5배 / 이동속도 절반.
     총 난이도가 폭증하지 않도록 개별 체력은 1/3,
     바리케이드 피해도 낮췄습니다. (물량으로 밀려오는 맛)
   ================================================================ */
const CONFIG = {
  logicalWidth: 420,
  logicalHeight: 740,
  barricadeY: 580,
  playerY: 636,
  barricadeMaxHp: 150,
  baseFireInterval: 0.9,    // 시작 공격속도 50% 하향 (0.45 → 0.9)
  baseDamage: 12,
  baseBulletSpeed: 540,
  wavesPerRun: 30,
  maxDeployed: 4,          // 출전 동료 제한
  maxMultishot: 5,         // 주인공 부채꼴 최대 5발
};
const W = CONFIG.logicalWidth, H = CONFIG.logicalHeight;

/* ================================================================
   [2] 동료 정의 — 6종
   ----------------------------------------------------------------
   각 동료: 고유 행동(update) + 강화 카드(maxLv 제한).
   comp.upLv[i] 로 각 강화의 현재 레벨을 추적하고,
   maxLv에 도달한 카드는 더 이상 뽑히지 않습니다.
   mover: true 인 동료는 가로로 뛰어다닙니다.
   ================================================================ */
// 이동형 동료(기공사·야구부) 공용: 방어선에 가장 가까운 적의 x로 이동
function moveToNearestX(comp, dt, speed) {
  let near = null;
  for (const z of game.zombies) if (!near || z.y > near.y) near = z;
  if (!near) return;
  const dx = near.x - comp.x;
  const step = speed * dt;
  if (Math.abs(dx) > step) comp.x += Math.sign(dx) * step;
  else comp.x = near.x;
  comp.x = Math.max(40, Math.min(W - 40, comp.x));
}

const COMPANION_DEFS = [
  {
    id: "sniper", name: "저격수", color: "#8e6fae",
    recruitDesc: "가장 체력 높은 적 저격 (2.2초, 기본 2관통)",
    initState: () => ({ cooldown: 0, dmgMul: 1, pierce: 2 }),
    update(comp, dt) {
      comp.cooldown -= dt;
      if (comp.cooldown > 0 || game.zombies.length === 0) return;
      let target = game.zombies[0];
      for (const z of game.zombies) if (z.hp > target.hp) target = z;
      const a = Math.atan2(target.y - CONFIG.playerY, target.x - comp.x);
      game.bullets.push({
        x: comp.x, y: CONFIG.playerY - 14,
        vx: Math.cos(a) * 1560, vy: Math.sin(a) * 1560,   // ★ 투사체 속도 2배
        hitsLeft: comp.pierce,
        damage: 30 * comp.dmgMul,
        sniper: true,
      });
      comp.cooldown = 2.2;
    },
    upgrades: [
      { name: "저격수: 대물 저격총", desc: "저격 피해 +55%", maxLv: 5, apply: c => c.dmgMul *= 1.55 },
      { name: "저격수: 철갑탄",     desc: "관통 +1",        maxLv: 3, apply: c => c.pierce += 1 },
    ],
    // 카드 우선순위: 관통(1번)을 1업 하기 전까진 관통 카드만 등장
    cardFilter: c => c.upLv[1] < 1 ? [1] : [0, 1],
  },
  {
    id: "medic", name: "의무병", color: "#5b9e7d",
    recruitDesc: "5초마다 바리케이드 6 회복",
    initState: () => ({ cooldown: 5, healAmt: 6, interval: 5 }),
    update(comp, dt) {
      comp.cooldown -= dt;
      if (comp.cooldown > 0) return;
      if (game.barricadeHp < CONFIG.barricadeMaxHp) {
        game.barricadeHp = Math.min(CONFIG.barricadeMaxHp, game.barricadeHp + comp.healAmt);
        spawnParticles(comp.x, CONFIG.barricadeY, "#5b9e7d", 5);
      }
      comp.cooldown = comp.interval;
    },
    upgrades: [
      { name: "의무병: 붕대 보급", desc: "회복량 +6",               maxLv: 5, apply: c => c.healAmt += 6 },
      { name: "의무병: 신속 처치", desc: "회복 간격 -1초 (최소 2초)", maxLv: 3, apply: c => c.interval = Math.max(2, c.interval - 1) },
    ],
  },
  {
    id: "driver", name: "드라이버", color: "#c9884a",
    recruitDesc: "10초마다 차량 출격, 경로의 적 격파 (증편 가능)",
    initState: () => ({ cooldown: 4, dmg: 32, interval: 10, fleet: 1, launchQueue: 0, launchTimer: 0 }),
    update(comp, dt) {
      comp.cooldown -= dt;
      // 쿨이 돌면 보유 차량 수만큼 출격 대기열에 올림
      if (comp.cooldown <= 0) {
        comp.launchQueue = comp.fleet;
        comp.launchTimer = 0;
        comp.cooldown = comp.interval;
      }
      // 대기열의 차량을 0.35초 간격으로 한 대씩, 서로 다른 타겟을 향해 발진
      if (comp.launchQueue > 0) {
        comp.launchTimer -= dt;
        if (comp.launchTimer <= 0 && game.zombies.length > 0) {
          // (보유차량-대기열)번째로 방어선에 가까운 적을 타겟으로 → 차마다 다른 적
          const sorted = [...game.zombies].sort((a, b) => b.y - a.y);
          const idx = Math.min(comp.fleet - comp.launchQueue, sorted.length - 1);
          // 형태는 랜덤 (승용차/오토바이/트럭/버스), 충돌 판정은 모두 동일
          const kinds = ["sedan", "bike", "truck", "bus"];
          game.cars.push({
            x: sorted[idx].x, y: CONFIG.barricadeY - 20, speed: 420, dmg: comp.dmg,
            id: ++game.carSeq,
            kind: kinds[Math.floor(Math.random() * kinds.length)],
          });
          comp.launchQueue--;
          comp.launchTimer = 0.35;
        }
      }
    },
    upgrades: [
      { name: "드라이버: 차량 증편", desc: "차량 +1대 (최대 5대)",       maxLv: 4, apply: c => c.fleet += 1 },
      { name: "드라이버: 강판 개조", desc: "차량 피해 +30",              maxLv: 5, apply: c => c.dmg += 30 },
      { name: "드라이버: 예열 정비", desc: "출격 간격 -2초 (최소 4초)",   maxLv: 3, apply: c => c.interval = Math.max(4, c.interval - 2) },
    ],
    // 카드 우선순위: 차량 3대가 될 때까진 증편만, 이후 셋 다 동일 확률
    cardFilter: c => c.fleet < 3 ? [0] : [0, 1, 2],
  },
  {
    id: "bomber", name: "폭탄병", color: "#b5533c",
    recruitDesc: "폭탄 투척 — 첫 명중 지점에 범위 피해 (2.5초)",
    initState: () => ({ cooldown: 1, dmg: 18, radiusLv: 0 }),
    update(comp, dt) {
      comp.cooldown -= dt;
      if (comp.cooldown > 0 || game.zombies.length === 0) return;
      let target = null;
      for (const z of game.zombies) if (!target || z.y > target.y) target = z;
      const a = Math.atan2(target.y - CONFIG.playerY, target.x - comp.x);
      // 폭발 범위: 기본 W/6, 렙업마다 커져서 3렙(맥스)에 W/4
      const radius = W / 6 + (W / 4 - W / 6) * (comp.radiusLv / 3);
      game.bullets.push({
        x: comp.x, y: CONFIG.playerY - 14,
        vx: Math.cos(a) * 430, vy: Math.sin(a) * 430,
        hitsLeft: 1, damage: comp.dmg,
        bomb: true, radius,
      });
      comp.cooldown = 2.5;
    },
    upgrades: [
      { name: "폭탄병: 확장 폭약", desc: "폭발 범위 확대 (3렙 맥스)", maxLv: 3, apply: c => c.radiusLv += 1 },
      { name: "폭탄병: 고성능 화약", desc: "폭발 피해 +50%",          maxLv: 5, apply: c => c.dmg = Math.round(c.dmg * 1.5) },
    ],
    // 카드 우선순위: 범위를 1업 하기 전까진 범위 카드만 등장
    cardFilter: c => c.radiusLv < 1 ? [0] : [0, 1],
  },
  {
    id: "engineer", name: "기공사", color: "#5aa8c9",
    recruitDesc: "좌우로 뛰며 전방 직선 사격 (사거리: 화면 세로 절반)",
    mover: true,
    initState: () => ({ cooldown: 0, dmg: 8, chainLv: 0 }),
    update(comp, dt) {
      // 이동: 방어선에 가장 가까운 적의 x 위치로 (437의 -20% = 350)
      moveToNearestX(comp, dt, 350);
      // 공격: 전방(위) 직선상, 사거리 H/2 이내의 가장 가까운 적
      comp.cooldown -= dt;
      if (comp.cooldown > 0) return;
      let target = null;
      for (const z of game.zombies) {
        if (Math.abs(z.x - comp.x) < 22 && z.y < CONFIG.playerY && CONFIG.playerY - z.y < H / 2) {
          if (!target || z.y > target.y) target = z;   // 제일 가까운(아래쪽) 적
        }
      }
      if (!target) return;
      // 명중 + 체인: 근처(W/4 이내)의 다른 적에게 튕김
      const hits = [target];
      let cur = target;
      for (let c = 0; c < comp.chainLv; c++) {
        let next = null, bestD = (W / 4) * (W / 4);
        for (const z of game.zombies) {
          if (hits.includes(z)) continue;
          const dx = z.x - cur.x, dy = z.y - cur.y, d2 = dx * dx + dy * dy;
          if (d2 < bestD) { bestD = d2; next = z; }
        }
        if (!next) break;
        hits.push(next);
        cur = next;
      }
      // 체인 라인 이펙트 기록 후 피해 적용
      const pts = [{ x: comp.x, y: CONFIG.playerY - 14 }, ...hits.map(z => ({ x: z.x, y: z.y }))];
      game.effects.push({ type: "chain", pts, life: 0.2 });
      for (const z of hits) {
        z.hp -= comp.dmg;
        spawnParticles(z.x, z.y, "#5aa8c9", 3);
      }
      // 죽은 적 정리 (뒤에서부터)
      for (let j = game.zombies.length - 1; j >= 0; j--) {
        if (game.zombies[j].hp <= 0) killZombie(j);
      }
      comp.cooldown = 0.35;
    },
    upgrades: [
      { name: "기공사: 전격 체인", desc: "공격이 근처 적 1명에게 추가로 튕김 (3렙 맥스)", maxLv: 3, apply: c => c.chainLv += 1 },
      { name: "기공사: 과부하",   desc: "피해 +40%",                                     maxLv: 5, apply: c => c.dmg = Math.round(c.dmg * 1.4) },
    ],
  },
  {
    id: "batter", name: "야구부", color: "#d4c05a",
    recruitDesc: "좌우로 뛰며 범위 내 적을 강타 — 방어선에 가까운 적일수록 아픔",
    mover: true,
    initState: () => ({ cooldown: 0, dmg: 22, rangeLv: 0 }),
    update(comp, dt) {
      // 이동: 방어선에 가장 가까운 적의 x 위치로 (기본 540의 +10% = 594)
      moveToNearestX(comp, dt, 594);
      comp.cooldown -= dt;
      if (comp.cooldown > 0) return;
      // 원형 스윙 범위: 기본 반지름 = 화면 세로의 30%, 범위 카드마다 +30% (4렙 맥스)
      const r = H * 0.3 * Math.pow(1.3, comp.rangeLv);
      const r2 = r * r;
      const inner2 = (r * 0.5) * (r * 0.5);   // 중심 50% 안쪽 = 2배 데미지
      const cx0 = comp.x, cy0 = CONFIG.playerY;
      let swung = false;
      for (let j = game.zombies.length - 1; j >= 0; j--) {
        const z = game.zombies[j];
        const dx = z.x - cx0, dy = z.y - cy0;
        const d2 = dx * dx + dy * dy;
        if (d2 < r2) {
          const mult = d2 < inner2 ? 2 : 1;
          z.hp -= comp.dmg * mult;
          // 기본 넉백 5: 야구부에서 멀어지는 방향으로 밀림
          const dist = Math.sqrt(d2) || 1;
          z.x += (dx / dist) * 5;
          z.y += (dy / dist) * 5;
          spawnParticles(z.x, z.y, "#d4c05a", 4);
          if (z.hp <= 0) killZombie(j);
          swung = true;
        }
      }
      if (swung) {
        game.effects.push({ type: "swing", x: cx0, y: cy0, hw: r, vh: r, life: 0.22 });
        comp.cooldown = 0.7;
        // ★ 스윙 범위 안에 축구공이 있으면: 그 방향으로 야구공을 장외로 날림!
        //   속도 = 축구공 속도 x2, 피해 = 축구공 피해 x2, 벽 반사 없이 관통 직진.
        //   축구공 자체에는 아무 영향 없음.
        const sc = game.companions.find(c => c.def.id === "soccer");
        if (sc && sc.balls && sc.balls.length > 0) {
          let nearBall = null, nearD = r2;
          for (const b of sc.balls) {
            const bx = b.x - cx0, by = b.y - cy0, bd = bx * bx + by * by;
            if (bd < nearD) { nearD = bd; nearBall = b; }
          }
          if (nearBall) {
            const a = Math.atan2(nearBall.y - cy0, nearBall.x - cx0);
            game.bullets.push({
              x: cx0, y: cy0 - 10,
              vx: Math.cos(a) * sc.ballSpeed * 2,
              vy: Math.sin(a) * sc.ballSpeed * 2,
              hitsLeft: 9999,
              damage: sc.dmg * 2,
              baseball: true,
              hitSet: new Set(),   // 같은 적 중복 타격 방지
            });
          }
        }
      }
    },
    upgrades: [
      { name: "야구부: 긴 배트", desc: "스윙 범위 +30% (4렙 맥스)", maxLv: 4, apply: c => c.rangeLv += 1 },
      { name: "야구부: 강타",   desc: "타격 피해 +40%",            maxLv: 5, apply: c => c.dmg = Math.round(c.dmg * 1.4) },
    ],
  },
  {
    id: "soccer", name: "축구부", color: "#d24038",
    recruitDesc: "축구공을 차서 벽에 튕기는 랠리 공격 — 공은 바리케이드에서 멈춤",
    mover: true,
    initState: () => ({ dmg: 16, ballSpeed: 560, ballCount: 1, balls: [], restSeq: 0 }),
    update(comp, dt) {
      const R = 7;   // 공 반지름
      // 공 개수 보충 (영입/여분의 공 직후): 발밑에 정지 상태로 생성
      while (comp.balls.length < comp.ballCount) {
        // 두 번째 공(banked)은 항상 옆 벽을 맞춰 적을 노리는 뱅크샷 전용
        comp.balls.push({
          x: comp.x, y: CONFIG.barricadeY - R - 1, vx: 0, vy: 0,
          rest: true, restAt: ++comp.restSeq,
          banked: comp.balls.length === 1,
        });
      }
      // ★ 쫓아갈 공 선택:
      //   ① 정지한 공이 있으면 "먼저 바리케이드에 도착한" 공(restAt이 작은 것)
      //   ② 없으면 도착 예상 시간(ETA)이 가장 짧은 공을 미리 마중
      let chase = null;
      const resting = comp.balls.filter(b => b.rest);
      if (resting.length > 0) {
        chase = resting.reduce((a, b) => (a.restAt < b.restAt ? a : b));
      } else {
        let best = Infinity;
        for (const b of comp.balls) {
          const eta = b.vy > 0 ? (CONFIG.barricadeY - b.y) / b.vy : Infinity;
          if (eta < best) { best = eta; chase = b; }
        }
        if (!chase) chase = comp.balls[0];
      }
      if (chase) {
        const dx = chase.x - comp.x;
        const step = 210 * dt;   // 기공사(350)의 60%
        if (Math.abs(dx) > step) comp.x += Math.sign(dx) * step;
        else comp.x = chase.x;
        comp.x = Math.max(40, Math.min(W - 40, comp.x));
      }
      for (const ball of comp.balls) {
        if (ball.rest) {
          // 공에 도착하면 방어선에 가장 가까운 적을 향해 킥 (랠리!)
          if (Math.abs(comp.x - ball.x) < 18 && game.zombies.length > 0) {
            let target = null;
            for (const z of game.zombies) if (!target || z.y > target.y) target = z;
            // ★ 뱅크샷(두 번째 공): 가까운 옆 벽 너머의 "거울상" 좌표를 조준하면
            //   벽 반사 후 정확히 실제 타겟에 도달합니다 (당구의 뱅크샷 원리)
            let aimX = target.x;
            if (ball.banked) {
              aimX = ball.x < W / 2 ? -target.x : 2 * W - target.x;
            }
            const a = Math.atan2(target.y - ball.y, aimX - ball.x);
            ball.vx = Math.cos(a) * comp.ballSpeed;
            ball.vy = Math.sin(a) * comp.ballSpeed;
            ball.rest = false;
          }
          continue;
        }
        ball.x += ball.vx * dt;
        ball.y += ball.vy * dt;
        // 알카노이드식 벽 반사: 좌/우/위
        if (ball.x < R)     { ball.x = R;     ball.vx = Math.abs(ball.vx); }
        if (ball.x > W - R) { ball.x = W - R; ball.vx = -Math.abs(ball.vx); }
        if (ball.y < R)     { ball.y = R;     ball.vy = Math.abs(ball.vy); }
        // 바리케이드에 닿으면 딱 정지
        // ★ 모서리 교착 방지: 축구부 발이 닿는 범위(x 42~378)로 공이 살짝 굴러 나옴
        if (ball.vy > 0 && ball.y >= CONFIG.barricadeY - R) {
          ball.y = CONFIG.barricadeY - R;
          ball.vx = 0; ball.vy = 0;
          ball.x = Math.max(42, Math.min(W - 42, ball.x));
          ball.rest = true;
          ball.restAt = ++comp.restSeq;   // 도착 순번 기록 (2개 공 우선순위용)
        }
        // 경로상의 적 타격 (좀비별 짧은 쿨다운으로 중복 타격 방지)
        for (let j = game.zombies.length - 1; j >= 0; j--) {
          const z = game.zombies[j];
          if (z.ballCd > 0) continue;
          const dx = ball.x - z.x, dy = ball.y - z.y;
          if (dx * dx + dy * dy < (z.size + R) * (z.size + R)) {
            z.hp -= comp.dmg;
            z.ballCd = 0.35;
            spawnParticles(z.x, z.y, "#e8e8ee", 3);
            if (z.hp <= 0) killZombie(j);
          }
        }
      }
    },
    upgrades: [
      { name: "축구부: 강슛 훈련",  desc: "축구공 속도 +177 (3렙 맥스 시 저격탄의 70%)", maxLv: 3, apply: c => c.ballSpeed += 177 },
      { name: "축구부: 정조준 킥",  desc: "축구공 피해 +40%",                            maxLv: 5, apply: c => c.dmg = Math.round(c.dmg * 1.4) },
      { name: "축구부: 여분의 공",  desc: "축구공 +1개 (최대 2개, 뱅크샷 전용)",          maxLv: 1, apply: c => c.ballCount = 2 },
    ],
    // 카드 우선순위: 공 속도 1렙까진 속도만, 이후 셋 다 동일 확률
    cardFilter: c => c.upLv[0] < 1 ? [0] : [0, 1, 2],
  },
];

/* ================================================================
   [3] 주인공 스킬 풀 — 더블 샷은 총 5발에서 맥스
   ================================================================ */
const HERO_SKILLS = [
  { name: "속사",       desc: "공격 속도 +35%",             apply: s => s.fireRateMul *= 1.35 },
  { name: "고화력 탄환", desc: "공격력 +45%",                apply: s => s.damageMul *= 1.45 },
  { name: "멀티 샷",     desc: "발사 탄환 +1 (최대 5발)",     apply: s => s.multishot += 1,
    available: s => s.multishot < CONFIG.maxMultishot },
  { name: "관통탄",      desc: "탄환이 적 1명을 추가 관통",    apply: s => s.pierce += 1 },
  { name: "넉백 강화",   desc: "명중 시 적을 밀어냄 +10",      apply: s => s.knockback += 10 },
  { name: "대구경 개조", desc: "공격력 +80%, 공격 속도 -15%", apply: s => { s.damageMul *= 1.80; s.fireRateMul *= 0.85; } },
];

/* ================================================================
   [4] 게임 상태
   ================================================================ */
let game, stats;
let gameSpeed = 1;
let pausedByHide = false;

// 주인공 스탯 = 훈련소에서 산 영구 강화(permHero)의 복사본.
// 웨이브 카드로 주인공을 키우는 시대는 끝났습니다 — 오직 훈련소!
function baseHeroStats() {
  return { fireRateMul: 1, damageMul: 1, multishot: 1, pierce: 0, knockback: 0, thorns: 0 };
}
function resetHeroStats() {
  stats = { ...game.permHero };
}

function resetGame() {
  game = {
    state: "battle",     // "battle" | "camp"
    running: false,
    wave: 0,
    campAtk: 0,
    permHero: baseHeroStats(),   // 훈련소 영구 강화 (한 판 내내 유지, 캠프에도 안 지워짐)
    barricadeHp: CONFIG.barricadeMaxHp,
    playerX: W / 2,
    fireCooldown: 0,
    bullets: [],
    zombies: [],
    cars: [],
    carSeq: 0,
    companions: [],      // 출전 중 (최대 4)
    reserve: [],         // 숙소 대기
    spawnQueue: 0,
    spawnTimer: 0,
    killCount: 0,
    hitFlash: 0,
    particles: [],
    effects: [],         // 체인/폭발/스윙 이펙트
  };
  resetHeroStats();
}

// 출전 동료들의 자리(x)를 다시 배정 — 뛰어다니는 동료는 시작 위치만 받음
const SLOT_X = [0.15, 0.38, 0.62, 0.85];
function assignSlots() {
  game.companions.forEach((comp, i) => {
    comp.x = W * SLOT_X[i % SLOT_X.length];
  });
}

/* ================================================================
   [5] 웨이브 — 챕터별 난이도 재시작 (11웨이브=5단계, 21웨이브=10단계)
   ================================================================ */
function diffOf(n) {
  // 난이도 = 웨이브 번호 (1~30 직선 상승).
  // 훈련소/공업 영구 성장이 생겨 챕터별 하향(11→5, 21→10)은 제거.
  return n;
}

function startWave(n) {
  game.wave = n;
  const d = diffOf(n);
  game.spawnQueue = Math.floor(3 + d * 1.3) * 5;   // ★ 적 수 5배
  game.spawnTimer = 0.3;
}

function spawnZombie() {
  const d = diffOf(game.wave);
  const big = d >= 4 && Math.random() < Math.min(0.22, 0.05 + d * 0.005);
  const hpBase = Math.max(4, Math.round((14 + d * 3 + d * d * 0.15) / 3));
  // 몰려오는 방향: 학교 정문(왼쪽) 또는 본관(오른쪽) 두 갈래
  const lane = Math.random() < 0.5 ? W * 0.25 : W * 0.75;
  const x = Math.max(45, Math.min(W - 45, lane + (Math.random() - 0.5) * W * 0.4));
  game.zombies.push({
    x,
    y: -30 - Math.random() * 40,
    hp:    big ? hpBase * 3 : hpBase,
    maxHp: big ? hpBase * 3 : hpBase,
    speed: Math.min(90, (big ? 24 : 38) + d * 0.5 + Math.random() * 10),   // 속도 원복
    size:  big ? 30 : 17,
    big,
    attackTimer: 0,
    lastCarId: 0,
    ballCd: 0,       // 축구공 피격 쿨다운
    wobble: Math.random() * Math.PI * 2,
  });
}

/* ================================================================
   [6] 캔버스 / 입력
   ================================================================ */
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
let scale = 1;
function resizeCanvas() {
  const dpr = window.devicePixelRatio || 1;
  scale = Math.min(window.innerWidth / W, window.innerHeight / H);
  canvas.style.width  = W * scale + "px";
  canvas.style.height = H * scale + "px";
  canvas.width  = W * scale * dpr;
  canvas.height = H * scale * dpr;
  ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);
}
window.addEventListener("resize", resizeCanvas);
resizeCanvas();

function pointerLogical(e) {
  const rect = canvas.getBoundingClientRect();
  const cx = e.touches ? e.touches[0].clientX : e.clientX;
  const cy = e.touches ? e.touches[0].clientY : e.clientY;
  return { x: (cx - rect.left) / scale, y: (cy - rect.top) / scale };
}

let dragging = false;
function onPointerDown(e) {
  const p = pointerLogical(e);
  if (game.state === "camp") { campTap(p.x, p.y); return; }
  dragging = true;
  onPointerMove(e);
}
function onPointerMove(e) {
  if (!dragging || !game.running || game.state !== "battle") return;
  const p = pointerLogical(e);
  game.playerX = Math.max(40, Math.min(W - 40, p.x));
}
function onPointerUp() { dragging = false; }
canvas.addEventListener("mousedown", onPointerDown);
canvas.addEventListener("mousemove", onPointerMove);
window.addEventListener("mouseup", onPointerUp);
canvas.addEventListener("touchstart", onPointerDown, { passive: true });
canvas.addEventListener("touchmove", onPointerMove, { passive: true });
window.addEventListener("touchend", onPointerUp);

/* ================================================================
   [7] 편의 기능
   ================================================================ */
const speedBtn = document.getElementById("speed-btn");
speedBtn.onclick = () => {
  gameSpeed = gameSpeed === 1 ? 2 : 1;
  speedBtn.textContent = "x" + gameSpeed;
  speedBtn.classList.toggle("on", gameSpeed === 2);
};
const fsBtn = document.getElementById("fs-btn");
fsBtn.onclick = () => {
  if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(() => {});
  else document.exitFullscreen();
};
const pauseBadge = document.getElementById("pause-badge");
document.addEventListener("visibilitychange", () => {
  pausedByHide = document.hidden;
  pauseBadge.style.display = (pausedByHide && game.running) ? "flex" : "none";
});
pauseBadge.onclick = () => { pausedByHide = false; pauseBadge.style.display = "none"; };

/* ================================================================
   [8] 업데이트 (전투)
   ================================================================ */
function update(dt) {
  // 스폰 — 물량전이라 간격도 1/5
  if (game.spawnQueue > 0) {
    game.spawnTimer -= dt;
    if (game.spawnTimer <= 0) {
      spawnZombie();
      game.spawnQueue--;
      game.spawnTimer = Math.max(0.06, (1.3 - diffOf(game.wave) * 0.03) / 5);
    }
  }

  // 주인공 자동 공격: 매 발사마다 방어선 최근접 적을 다시 조준
  game.fireCooldown -= dt;
  if (game.fireCooldown <= 0 && game.zombies.length > 0) {
    let target = null;
    for (const z of game.zombies) if (!target || z.y > target.y) target = z;
    fireAt(target);
    game.fireCooldown = CONFIG.baseFireInterval / stats.fireRateMul;
  }

  // 동료 행동 (출전 중인 4명만)
  for (const comp of game.companions) comp.def.update(comp, dt);

  // 탄환
  for (let i = game.bullets.length - 1; i >= 0; i--) {
    const b = game.bullets[i];
    b.x += b.vx * dt; b.y += b.vy * dt;
    if (b.y < -40 || b.y > H + 40 || b.x < -40 || b.x > W + 40) {
      game.bullets.splice(i, 1); continue;
    }
    for (let j = game.zombies.length - 1; j >= 0; j--) {
      const z = game.zombies[j];
      const dx = b.x - z.x, dy = b.y - z.y;
      if (dx * dx + dy * dy < (z.size + 5) * (z.size + 5)) {
        if (b.bomb) {
          explode(b.x, b.y, b.radius, b.damage);
          game.bullets.splice(i, 1);
          break;
        } else if (b.baseball) {
          // 야구공: 전부 관통(장외까지 직진), 같은 적은 한 번만 타격
          if (!b.hitSet.has(z)) {
            b.hitSet.add(z);
            z.hp -= b.damage;
            spawnParticles(z.x, z.y, "#f0e6d0", 3);
            if (z.hp <= 0) killZombie(j);
          }
          continue;   // break 없이 경로상의 다음 적도 검사
        } else {
          z.hp -= b.damage !== undefined ? b.damage : CONFIG.baseDamage * stats.damageMul * (1 + 0.2 * game.campAtk);
          z.y -= stats.knockback;
          spawnParticles(z.x, z.y, "#c33b2e", 2);
          if (--b.hitsLeft <= 0) game.bullets.splice(i, 1);
          if (z.hp <= 0) killZombie(j);
          break;
        }
      }
    }
  }

  // 차량: 아래→위 돌진
  for (let i = game.cars.length - 1; i >= 0; i--) {
    const car = game.cars[i];
    car.y -= car.speed * dt;
    for (let j = game.zombies.length - 1; j >= 0; j--) {
      const z = game.zombies[j];
      if (z.lastCarId === car.id) continue;
      if (Math.abs(car.x - z.x) < 30 + z.size && Math.abs(car.y - z.y) < 34) {
        z.lastCarId = car.id;
        z.hp -= car.dmg;
        z.y -= 20;
        spawnParticles(z.x, z.y, "#c9884a", 4);
        if (z.hp <= 0) killZombie(j);
      }
    }
    if (car.y < -60) game.cars.splice(i, 1);
  }

  // 좀비 전진
  for (let i = game.zombies.length - 1; i >= 0; i--) {
    const z = game.zombies[i];
    z.wobble += dt * 7;
    if (z.ballCd > 0) z.ballCd -= dt;
    if (z.y < CONFIG.barricadeY - z.size - 8) {
      z.y += z.speed * dt;
    } else {
      z.attackTimer -= dt;
      if (z.attackTimer <= 0) {
        game.barricadeHp -= z.big ? 4 : 1;   // 물량전이라 개별 피해 하향
        game.hitFlash = 0.2;
        z.attackTimer = 1.0;
        if (stats.thorns > 0) {
          z.hp -= 6 * stats.thorns;
          if (z.hp <= 0) { killZombie(i); continue; }
        }
      }
    }
  }

  // 파티클 / 이펙트 / 플래시
  for (let i = game.particles.length - 1; i >= 0; i--) {
    const p = game.particles[i];
    p.x += p.vx * dt; p.y += p.vy * dt; p.life -= dt;
    if (p.life <= 0) game.particles.splice(i, 1);
  }
  for (let i = game.effects.length - 1; i >= 0; i--) {
    game.effects[i].life -= dt;
    if (game.effects[i].life <= 0) game.effects.splice(i, 1);
  }
  if (game.hitFlash > 0) game.hitFlash -= dt;

  // 승패 / 웨이브 종료
  if (game.barricadeHp <= 0) { endGame(false); return; }
  if (game.spawnQueue === 0 && game.zombies.length === 0) {
    if (game.wave >= CONFIG.wavesPerRun) { endGame(true); return; }
    game.running = false;
    if (game.wave % 10 === 0) enterCamp();
    else showCardChoices();
  }
}

// 폭탄병의 폭발: 반경 내 모든 적에게 피해
function explode(x, y, radius, dmg) {
  game.effects.push({ type: "boom", x, y, r: radius, life: 0.25 });
  const r2 = radius * radius;
  for (let j = game.zombies.length - 1; j >= 0; j--) {
    const z = game.zombies[j];
    const dx = z.x - x, dy = z.y - y;
    if (dx * dx + dy * dy < r2) {
      z.hp -= dmg;
      spawnParticles(z.x, z.y, "#b5533c", 3);
      if (z.hp <= 0) killZombie(j);
    }
  }
}

function fireAt(target) {
  const dx = target.x - game.playerX, dy = target.y - CONFIG.playerY;
  const baseAngle = Math.atan2(dy, dx);
  const n = stats.multishot;
  for (let k = 0; k < n; k++) {
    const spread = n === 1 ? 0 : (k / (n - 1) - 0.5) * 0.2;
    const a = baseAngle + spread;
    game.bullets.push({
      x: game.playerX, y: CONFIG.playerY - 14,
      vx: Math.cos(a) * CONFIG.baseBulletSpeed,
      vy: Math.sin(a) * CONFIG.baseBulletSpeed,
      hitsLeft: 1 + stats.pierce,
    });
  }
}

function killZombie(index) {
  const z = game.zombies[index];
  spawnParticles(z.x, z.y, z.big ? "#7a9e4f" : "#5b7d3c", 6);
  game.zombies.splice(index, 1);
  game.killCount++;
}

function spawnParticles(x, y, color, count) {
  // 물량전이라 파티클 총량 제한 (성능 보호)
  if (game.particles.length > 250) return;
  for (let i = 0; i < count; i++) {
    const a = Math.random() * Math.PI * 2;
    const sp = 40 + Math.random() * 120;
    game.particles.push({ x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp, life: 0.25 + Math.random() * 0.2, color });
  }
}

/* ================================================================
   [9] 카드 시스템
   - 영입: 미보유 동료 (보유 = 출전 + 대기)
   - 강화: 보유 동료의 카드 중 maxLv 미달인 것만
   - 주인공: available 조건(더블샷 5발 제한 등) 충족 카드만
   ================================================================ */
function allOwned() { return [...game.companions, ...game.reserve]; }

function buildCardPool() {
  const recruits = [];
  const others = [];
  // 출전이 4명 꽉 차면 영입 카드는 더 이상 등장하지 않음
  const canRecruit = game.companions.length < CONFIG.maxDeployed;
  for (const def of COMPANION_DEFS) {
    const owned = allOwned().find(c => c.def.id === def.id);
    const deployed = game.companions.find(c => c.def.id === def.id);
    if (!owned) {
      if (canRecruit) {
        // 의무병은 1~10웨이브에서 영입 카드 금지 (강당 합류로만 얻음)
        if (def.id === "medic" && game.wave <= 10) continue;
        recruits.push({
          tag: "동료 영입", cls: "recruit",
          name: def.name + " 영입",
          desc: def.recruitDesc,
          apply: () => recruitCompanion(def),
        });
      }
    } else if (deployed) {
      // 강화 카드는 "출전 중"인 동료만 등장 (기숙사 대기 중이면 금지)
      const allowed = def.cardFilter ? def.cardFilter(deployed) : def.upgrades.map((_, i) => i);
      def.upgrades.forEach((up, i) => {
        if (!allowed.includes(i)) return;
        if (deployed.upLv[i] >= up.maxLv) return;   // 맥스 도달 카드는 제외
        others.push({
          tag: `${def.name} 강화 (${deployed.upLv[i]}/${up.maxLv})`, cls: "ally",
          name: up.name, desc: up.desc,
          apply: () => { up.apply(deployed); deployed.upLv[i]++; deployed.level++; },
        });
      });
    }
  }
  // ★ 주인공 카드는 웨이브에서 등장 금지 — 강당의 개인 훈련소에서만 영구 강화
  return { recruits, others };
}

function recruitCompanion(def) {
  const comp = { def, level: 1, upLv: def.upgrades.map(() => 0), x: W / 2, ...def.initState() };
  if (game.companions.length < CONFIG.maxDeployed) {
    game.companions.push(comp);
    assignSlots();
  } else {
    game.reserve.push(comp);   // 자리가 없으면 숙소 대기 (캠프에서 교체)
  }
}

const skillOverlay = document.getElementById("skill-overlay");
const skillCards = document.getElementById("skill-cards");

function showCardChoices() {
  const { recruits, others } = buildCardPool();
  const picks = [];
  if (recruits.length > 0) {
    picks.push(recruits.splice(Math.floor(Math.random() * recruits.length), 1)[0]);
  }
  const pool = [...recruits, ...others];
  while (picks.length < 3 && pool.length > 0) {
    picks.push(pool.splice(Math.floor(Math.random() * pool.length), 1)[0]);
  }
  // 모든 강화가 맥스라 보여줄 카드가 없으면 바로 다음 웨이브로
  if (picks.length === 0) {
    startWave(game.wave + 1);
    game.running = true;
    return;
  }
  skillCards.innerHTML = "";
  skillCards.style.display = "flex";
  skillCards.style.flexDirection = "column";
  skillCards.style.gap = "10px";
  picks.forEach(card => {
    const el = document.createElement("div");
    el.className = "skill-card " + card.cls;
    el.innerHTML = `<div class="tag">${card.tag}</div><div class="name">${card.name}</div><div class="desc">${card.desc}</div>`;
    el.onclick = () => {
      card.apply();
      skillOverlay.style.display = "none";
      startWave(game.wave + 1);
      game.running = true;
    };
    skillCards.appendChild(el);
  });
  skillOverlay.style.display = "flex";
}

/* ================================================================
   [10] 캠프 — 캔버스로 그리는 장면 + 시설 터치
   ----------------------------------------------------------------
   위: 바리케이드 / 중앙: 마을 회관 / 좌하: 임시 의무대 / 우하: 숙소
   시설을 탭하면 패널이 열립니다. 하단의 [출정] 탭으로 재출발.
   ================================================================ */
const CAMP_ZONES = {
  hall:   { x: 296,        y: 36,  w: 112, h: 80 },    // 2층 방송실 부스
  medic:  { x: 28,         y: 122, w: 364, h: 92 },    // 무대 위 임시 양호실
  train:  { x: 12,         y: 540, w: 126, h: 112 },   // 1층 구석 방 (개인 훈련소)
  lodge:  { x: 286,        y: 424, w: 124, h: 146 },   // 코트 한쪽 침낭 (임시 기숙사)
  depart: { x: W / 2 - 80, y: 660, w: 160, h: 52 },
};

function enterCamp() {
  game.state = "camp";
  game.barricadeHp = CONFIG.barricadeMaxHp;   // 도착하며 기본 정비
  resetHeroStats();                            // 주인공은 훈련소 영구 강화만 유지
  // ★ 동료들도 전투 강화 전부 초기화 (영입/출전 상태는 유지)
  for (const comp of allOwned()) {
    Object.assign(comp, comp.def.initState());
    comp.upLv = comp.def.upgrades.map(() => 0);
    comp.level = 1;
  }
  game.bullets = []; game.cars = []; game.particles = []; game.effects = [];
  // 날이 밝자, 안전한 캠프가 있다는 소문을 듣고 남은 동료들이 전부 합류
  const joined = [];
  for (const def of COMPANION_DEFS) {
    if (!allOwned().find(c => c.def.id === def.id)) {
      recruitCompanion(def);   // 출전에 자리가 있으면 배치, 없으면 임시 기숙사 대기
      joined.push(def.name);
    }
  }
  game.campNotice = joined.length > 0 ? "소문을 듣고 합류: " + joined.join(", ") : "";
}

function campTap(x, y) {
  const hit = (z) => x >= z.x && x <= z.x + z.w && y >= z.y && y <= z.y + z.h;
  if (hit(CAMP_ZONES.hall))   { openFacility("hall"); return; }
  if (hit(CAMP_ZONES.medic))  { openFacility("medic"); return; }
  if (hit(CAMP_ZONES.train))  { openTrain(); return; }
  if (hit(CAMP_ZONES.lodge))  { openLodge(); return; }
  if (hit(CAMP_ZONES.depart)) { departCamp(); return; }
}

function departCamp() {
  game.state = "battle";
  startWave(game.wave + 1);
  game.running = true;
}

/* ---- 마을회관 / 의무대 패널 ---- */
const facPanel = document.getElementById("facility-panel");
const facTitle = document.getElementById("fac-title");
const facDesc = document.getElementById("fac-desc");
const facAction = document.getElementById("fac-action");
document.getElementById("fac-close").onclick = () => { facPanel.style.display = "none"; };

let currentFacility = null;
function openFacility(kind) {
  currentFacility = kind;
  refreshFacility();
  facPanel.style.display = "flex";
}
function refreshFacility() {
  if (currentFacility === "hall") {
    facTitle.textContent = "📢 강당 방송실";
    facDesc.innerHTML = `방송으로 작전을 지시해 부대의 공격력을 끌어올립니다. 강화는 한 판 내내 유지됩니다.<br>
      보유 킬: <span class="kills">${game.killCount}</span> · 현재 공격력: <span class="kills">+${game.campAtk * 20}%</span>`;
    facAction.textContent = "공격력 +20% — 200킬";
    facAction.disabled = game.killCount < 200;
    facAction.onclick = () => {
      if (game.killCount < 200) return;
      game.killCount -= 200;
      game.campAtk++;
      refreshFacility();
    };
  } else {
    facTitle.textContent = "⛑ 임시 양호실";
    facDesc.innerHTML = `바리케이드를 완전 수리합니다.<br>
      보유 킬: <span class="kills">${game.killCount}</span> · 바리케이드: <span class="kills">${Math.ceil(game.barricadeHp)} / ${CONFIG.barricadeMaxHp}</span>`;
    facAction.textContent = "완전 수리 — 100킬";
    facAction.disabled = game.killCount < 100 || game.barricadeHp >= CONFIG.barricadeMaxHp;
    facAction.onclick = () => {
      if (game.killCount < 100) return;
      game.killCount -= 100;
      game.barricadeHp = CONFIG.barricadeMaxHp;
      refreshFacility();
    };
  }
}

/* ---- 개인 훈련소: 주인공 영구 강화 (50킬, permHero에 적용) ---- */
const trainPanel = document.getElementById("train-panel");
const trainList = document.getElementById("train-list");
const trainKills = document.getElementById("train-kills");
document.getElementById("train-close").onclick = () => { trainPanel.style.display = "none"; };
const TRAIN_COST = 50;

function openTrain() {
  refreshTrain();
  trainPanel.style.display = "flex";
}
function refreshTrain() {
  trainKills.textContent = game.killCount;
  trainList.innerHTML = "";
  for (const sk of HERO_SKILLS) {
    const maxed = sk.available && !sk.available(game.permHero);
    const row = document.createElement("div");
    row.className = "train-row";
    row.innerHTML = `<div><div class="tname">${sk.name}</div><div class="tdesc">${sk.desc}</div></div>`;
    const btn = document.createElement("button");
    btn.className = "train-buy";
    btn.textContent = maxed ? "맥스" : "50킬";
    btn.disabled = maxed || game.killCount < TRAIN_COST;
    btn.onclick = () => {
      if (game.killCount < TRAIN_COST) return;
      game.killCount -= TRAIN_COST;
      sk.apply(game.permHero, game);   // 영구 스탯에 적용
      resetHeroStats();                 // 현재 스탯에 즉시 반영
      refreshTrain();
    };
    row.appendChild(btn);
    trainList.appendChild(row);
  }
}

/* ---- 숙소: 동료 교체 ---- */
const lodgePanel = document.getElementById("lodge-panel");
const deployedList = document.getElementById("deployed-list");
const reserveList = document.getElementById("reserve-list");
const deployCount = document.getElementById("deploy-count");
document.getElementById("lodge-close").onclick = () => { lodgePanel.style.display = "none"; };

function openLodge() {
  refreshLodge();
  lodgePanel.style.display = "flex";
}
function rosterRow(comp, action) {
  const el = document.createElement("div");
  el.className = "roster-row";
  el.innerHTML = `<span class="rname" style="color:${comp.def.color}">${comp.def.name}</span>
    <span class="rlv">Lv ${comp.level}</span>
    <span class="rmove">${action === "bench" ? "대기로 ▼" : "출전 ▲"}</span>`;
  el.onclick = () => {
    if (action === "bench") {
      game.companions.splice(game.companions.indexOf(comp), 1);
      game.reserve.push(comp);
    } else {
      if (game.companions.length >= CONFIG.maxDeployed) return;
      game.reserve.splice(game.reserve.indexOf(comp), 1);
      game.companions.push(comp);
    }
    assignSlots();
    refreshLodge();
  };
  return el;
}
function refreshLodge() {
  deployCount.textContent = game.companions.length;
  deployedList.innerHTML = "";
  reserveList.innerHTML = "";
  if (game.companions.length === 0) deployedList.innerHTML = `<div class="roster-empty">출전 중인 동료가 없습니다</div>`;
  if (game.reserve.length === 0) reserveList.innerHTML = `<div class="roster-empty">대기 중인 동료가 없습니다</div>`;
  game.companions.forEach(c => deployedList.appendChild(rosterRow(c, "bench")));
  game.reserve.forEach(c => reserveList.appendChild(rosterRow(c, "deploy")));
}

/* ---- 캠프 장면 그리기: 강당 내부 이미지 + 동적 라벨 ---- */
function campLabel(text, x, y, color) {
  ctx.font = "bold 12px sans-serif";
  ctx.textAlign = "center";
  const w = ctx.measureText(text).width + 14;
  ctx.fillStyle = "rgba(20,18,16,0.72)";
  ctx.beginPath();
  ctx.roundRect(x - w / 2, y - 12, w, 18, 6);
  ctx.fill();
  ctx.fillStyle = color || "#e8d9b8";
  ctx.fillText(text, x, y + 2);
}

function drawCamp() {
  // 강당 내부 (농구 코트 + 무대 + 2층 관중석)
  if (IMAGES.campBg) {
    ctx.drawImage(IMAGES.campBg, 0, 0, W, H);
  } else {
    ctx.fillStyle = "#8a6c48";
    ctx.fillRect(0, 0, W, H);
  }

  // ---- 시설 라벨 (탭 유도) ----
  const hz = CAMP_ZONES.hall;
  campLabel(`\uD83D\uDCE2 \ubc29\uc1a1\uc2e4 \u00b7 \uacf5\uaca9\ub825 +${game.campAtk * 20}%`, hz.x + hz.w / 2 - 24, hz.y + hz.h + 12, "#d9a441");
  campLabel("\u26d1 \uc784\uc2dc \uc591\ud638\uc2e4 (\ubb34\ub300)", W / 2, CAMP_ZONES.medic.y + CAMP_ZONES.medic.h + 10);
  const tz = CAMP_ZONES.train;
  campLabel("\uD83C\uDFAF \uac1c\uc778 \ud6c8\ub828\uc18c", tz.x + tz.w / 2, tz.y - 10, "#e06a5c");
  const lz = CAMP_ZONES.lodge;
  campLabel(`\uD83D\uDECF \uc784\uc2dc \uae30\uc219\uc0ac \u00b7 \ucd9c\uc804 ${game.companions.length}/4`, lz.x + lz.w / 2 - 14, lz.y - 10, "#6fa3d4");

  // 합류 알림
  if (game.campNotice) {
    ctx.font = "bold 12px sans-serif";
    ctx.textAlign = "center";
    ctx.fillStyle = "rgba(20,18,16,0.72)";
    const nw = ctx.measureText(game.campNotice).width + 16;
    ctx.beginPath(); ctx.roundRect(W / 2 - nw / 2, 380, nw, 20, 6); ctx.fill();
    ctx.fillStyle = "#8fd0a0";
    ctx.fillText(game.campNotice, W / 2, 394);
  }

  // ---- 상단 안내 + 보유 킬 ----
  ctx.fillStyle = "rgba(0,0,0,0.45)";
  ctx.fillRect(0, 0, W, 34);
  ctx.fillStyle = "#d9a441";
  ctx.font = "bold 14px sans-serif";
  ctx.textAlign = "left";
  ctx.fillText("\u2600 \ub0a0\uc774 \ubc1d\uc558\ub2e4 \u2014 \uac15\ub2f9", 12, 22);
  ctx.textAlign = "right";
  ctx.fillText(`\ubcf4\uc720 \ud0ac ${game.killCount}`, W - 12, 22);

  // ---- \ucd9c\uc815 \ubc84\ud2bc ----
  const dz = CAMP_ZONES.depart;
  ctx.fillStyle = "#c33b2e";
  ctx.beginPath();
  ctx.roundRect(dz.x, dz.y, dz.w, dz.h, 10);
  ctx.fill();
  ctx.fillStyle = "#fff";
  ctx.font = "bold 18px sans-serif";
  ctx.textAlign = "center";
  ctx.fillText("\ucd9c \uc815", dz.x + dz.w / 2, dz.y + 33);
  ctx.fillStyle = "rgba(20,18,16,0.72)";
  const hint = "\uc2dc\uc124\uc744 \ud0ed\ud574\uc11c \uc774\uc6a9 \u00b7 \ucd9c\uc815 \uc2dc \uce74\ub4dc \uac15\ud654 \ucd08\uae30\ud654 \u00b7 \ud6c8\ub828\uc18c\ub294 \uc601\uad6c";
  ctx.font = "11px sans-serif";
  const hw2 = ctx.measureText(hint).width + 14;
  ctx.beginPath(); ctx.roundRect(W / 2 - hw2 / 2, dz.y - 24, hw2, 17, 6); ctx.fill();
  ctx.fillStyle = "#c9b896";
  ctx.fillText(hint, W / 2, dz.y - 11);
}

/* ================================================================
   [11] 그리기 (전투)
   ================================================================ */
function draw() {
  if (game.state === "camp") { drawCamp(); return; }

  if (IMAGES.background) {
    ctx.drawImage(IMAGES.background, 0, 0, W, H);
  } else {
    const g = ctx.createLinearGradient(0, 0, 0, H);
    g.addColorStop(0, "#11151a");
    g.addColorStop(0.78, "#171c22");
    g.addColorStop(1, "#1a2027");
    ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);

    // ---- 학교 배경: 왼쪽 = 정문, 오른쪽 = 본관 (놈들이 몰려오는 방향) ----
    // 정문: 기둥 2개 + 철제 담장
    ctx.fillStyle = "#2a313a";
    ctx.fillRect(W * 0.12, 44, 12, 46);
    ctx.fillRect(W * 0.36, 44, 12, 46);
    ctx.strokeStyle = "#232a32";
    ctx.lineWidth = 3;
    for (let i = 0; i < 6; i++) {
      const gx = W * 0.15 + i * (W * 0.21 / 6) + 8;
      ctx.beginPath(); ctx.moveTo(gx, 52); ctx.lineTo(gx, 90); ctx.stroke();
    }
    // 본관: 건물 실루엣 + 창문
    ctx.fillStyle = "#252c35";
    ctx.fillRect(W * 0.58, 38, W * 0.34, 52);
    ctx.fillStyle = "#161b21";
    for (let r = 0; r < 2; r++) for (let c = 0; c < 5; c++) {
      ctx.fillRect(W * 0.60 + c * (W * 0.062), 46 + r * 22, 14, 14);
    }
  }
  // 라벨 (배경 이미지가 있어도 항상 표시)
  ctx.fillStyle = "rgba(200,190,160,0.45)";
  ctx.font = "10px sans-serif";
  ctx.textAlign = "center";
  ctx.fillText("정문", W * 0.25, 104);
  ctx.fillText("본관", W * 0.75, 104);

  // 바리케이드
  const hpRatio = Math.max(0, game.barricadeHp / CONFIG.barricadeMaxHp);
  ctx.fillStyle = hpRatio > 0.4 ? "#6b5a3e" : "#7a3b2e";
  ctx.fillRect(10, CONFIG.barricadeY - 7, W - 20, 14);
  ctx.fillStyle = "rgba(0,0,0,0.25)";
  for (let x = 20; x < W - 20; x += 26) ctx.fillRect(x, CONFIG.barricadeY - 7, 5, 14);
  ctx.fillStyle = "rgba(200,190,160,0.4)";
  ctx.font = "10px sans-serif";
  ctx.textAlign = "center";
  ctx.fillText("강당 앞 바리케이드", W / 2, CONFIG.barricadeY + 22);

  // 동료
  for (const comp of game.companions) drawCompanion(comp);

  // 축구공 (축구부 보유 공)
  for (const comp of game.companions) {
    if (!comp.balls) continue;
    for (const ball of comp.balls) {
      ctx.fillStyle = "#f0f0f4";
      ctx.beginPath(); ctx.arc(ball.x, ball.y, 7, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = "#24161c";
      ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.arc(ball.x, ball.y, 7, 0, Math.PI * 2); ctx.stroke();
      // 오각형 무늬 (중앙 점 + 주변 점)
      ctx.fillStyle = "#24161c";
      ctx.beginPath(); ctx.arc(ball.x, ball.y, 2.2, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(ball.x - 4, ball.y - 3, 1.3, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(ball.x + 4, ball.y - 3, 1.3, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(ball.x, ball.y + 4.5, 1.3, 0, Math.PI * 2); ctx.fill();
    }
  }

  // 주인공
  drawPlayer(game.playerX, CONFIG.playerY);

  // 좀비
  for (const z of game.zombies) drawZombie(z);

  // 차량 (형태만 다르고 판정은 동일)
  for (const car of game.cars) {
    const cimg = IMAGES[car.kind];
    if (cimg) {
      ctx.drawImage(cimg, car.x - 18, car.y - 30, 36, 60);
    } else if (car.kind === "bike") {
      // 오토바이 (위에서 본 모습): 앞뒤 바퀴 + 차체 + 핸들바 + 라이더
      ctx.fillStyle = "#1f1f24";                                   // 앞바퀴
      ctx.fillRect(car.x - 4, car.y - 26, 8, 13);
      ctx.fillRect(car.x - 4, car.y + 13, 8, 13);                  // 뒷바퀴
      ctx.fillStyle = "#c33b2e";                                   // 차체 (밝은 빨강)
      ctx.fillRect(car.x - 6, car.y - 15, 12, 30);
      ctx.fillStyle = "#2b2b2b";                                   // 핸들바 (가로로 넓게)
      ctx.fillRect(car.x - 15, car.y - 13, 30, 4);
      ctx.fillStyle = "#ffd47a";                                   // 전조등
      ctx.beginPath(); ctx.arc(car.x, car.y - 22, 3, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = "#3d5a80";                                   // 라이더 헬멧
      ctx.beginPath(); ctx.arc(car.x, car.y + 3, 7, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = "#e8e8f0";                                   // 헬멧 하이라이트
      ctx.beginPath(); ctx.arc(car.x - 2, car.y + 1, 2.5, 0, Math.PI * 2); ctx.fill();
    } else if (car.kind === "truck") {
      // 트럭: 캡 + 짐칸
      ctx.fillStyle = "#7a8a5a";
      ctx.fillRect(car.x - 14, car.y - 30, 28, 20);   // 캡 (전방)
      ctx.fillStyle = "#5a6a48";
      ctx.fillRect(car.x - 14, car.y - 8, 28, 38);    // 짐칸
      ctx.fillStyle = "#d9c9a0";
      ctx.fillRect(car.x - 9, car.y - 27, 18, 7);     // 앞유리
    } else if (car.kind === "bus") {
      // 버스: 길쭉한 차체 + 창문 줄
      ctx.fillStyle = "#c9a441";
      ctx.fillRect(car.x - 15, car.y - 35, 30, 70);
      ctx.fillStyle = "#e8e0c0";
      for (let wy = -26; wy <= 22; wy += 12) ctx.fillRect(car.x - 10, car.y + wy, 20, 6);
    } else {
      // 승용차 (기본)
      ctx.fillStyle = "#c9884a";
      ctx.fillRect(car.x - 13, car.y - 26, 26, 52);
      ctx.fillStyle = "#2b2b2b";
      ctx.fillRect(car.x - 9, car.y - 12, 18, 22);
    }
  }

  // 탄환
  for (const b of game.bullets) {
    if (b.baseball) {
      // 야구공: 흰 공 + 빨간 실밥 두 줄
      ctx.fillStyle = "#f4f2ec";
      ctx.beginPath(); ctx.arc(b.x, b.y, 5.5, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = "#c33b2e";
      ctx.lineWidth = 1.3;
      ctx.beginPath(); ctx.arc(b.x - 2, b.y, 3.6, -0.9, 0.9); ctx.stroke();
      ctx.beginPath(); ctx.arc(b.x + 2, b.y, 3.6, Math.PI - 0.9, Math.PI + 0.9); ctx.stroke();
    } else if (b.bomb) {
      ctx.fillStyle = "#b5533c";
      ctx.beginPath(); ctx.arc(b.x, b.y, 7, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = "#e8975a";
      ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.arc(b.x, b.y, 7, 0, Math.PI * 2); ctx.stroke();
    } else if (IMAGES.bullet && !b.sniper) {
      ctx.drawImage(IMAGES.bullet, b.x - 6, b.y - 6, 12, 12);
    } else {
      ctx.fillStyle = b.sniper ? "#c9a0ff" : "#ffd47a";
      ctx.beginPath(); ctx.arc(b.x, b.y, b.sniper ? 5 : 4, 0, Math.PI * 2); ctx.fill();
    }
  }

  // 이펙트 (체인 번개 / 폭발 / 스윙)
  for (const e of game.effects) {
    if (e.type === "chain") {
      // 전기(번개) 이펙트: 3중 스트로크 (넓은 글로우 → 중간 → 흰 심지)
      const a = Math.min(1, e.life * 6.5);
      ctx.lineJoin = "round";
      ctx.lineCap = "round";
      for (const [lw, color] of [
        [11, `rgba(70,150,255,${a * 0.35})`],
        [6,  `rgba(130,200,255,${a * 0.8})`],
        [2.5, `rgba(245,250,255,${a})`],
      ]) {
        ctx.lineWidth = lw;
        ctx.strokeStyle = color;
        ctx.beginPath();
        ctx.moveTo(e.pts[0].x, e.pts[0].y);
        for (let i = 1; i < e.pts.length; i++) {
          const p0 = e.pts[i - 1], p1 = e.pts[i];
          // 1/3, 2/3 지점을 좌우로 흔들어 번개 꺾임 표현
          ctx.lineTo(p0.x + (p1.x - p0.x) / 3 + (Math.random() - 0.5) * 18,
                     p0.y + (p1.y - p0.y) / 3 + (Math.random() - 0.5) * 18);
          ctx.lineTo(p0.x + (p1.x - p0.x) * 2 / 3 + (Math.random() - 0.5) * 18,
                     p0.y + (p1.y - p0.y) * 2 / 3 + (Math.random() - 0.5) * 18);
          ctx.lineTo(p1.x, p1.y);
        }
        ctx.stroke();
      }
      // 타격 지점 스파크 (감전된 적 위에 밝은 점)
      ctx.fillStyle = `rgba(200,230,255,${a})`;
      for (let i = 1; i < e.pts.length; i++) {
        ctx.beginPath();
        ctx.arc(e.pts[i].x, e.pts[i].y, 5 + Math.random() * 3, 0, Math.PI * 2);
        ctx.fill();
      }
    } else if (e.type === "boom") {
      const t = 1 - e.life / 0.25;
      ctx.strokeStyle = `rgba(232,151,90,${1 - t})`;
      ctx.lineWidth = 4;
      ctx.beginPath(); ctx.arc(e.x, e.y, e.r * t, 0, Math.PI * 2); ctx.stroke();
    } else if (e.type === "swing") {
      // 채워진 부채꼴 스윕: 왼쪽→오른쪽으로 배트가 쓸고 지나가는 잔상
      const dur = 0.22;
      const t = Math.min(1, 1 - e.life / dur);                 // 스윙 진행도 (0→1)
      const a = Math.max(0, Math.min(1, e.life * 5));
      const ang = Math.PI * (1 + Math.min(1, t * 1.15));       // 배트의 현재 각도
      ctx.save();
      ctx.translate(e.x, e.y);
      ctx.scale(e.hw, e.vh);                                    // 단위원 → 타원 (가로/세로 범위 그대로)
      // ① 은은한 잔상 반원 (전체 타격 범위 표시)
      ctx.fillStyle = `rgba(212,192,90,${a * 0.16})`;
      ctx.beginPath(); ctx.moveTo(0, 0);
      ctx.arc(0, 0, 1, Math.PI, Math.PI * 2);
      ctx.closePath(); ctx.fill();
      // ② 배트를 따라오는 밝은 스윕 부채꼴
      ctx.fillStyle = `rgba(240,222,130,${a * 0.5})`;
      ctx.beginPath(); ctx.moveTo(0, 0);
      ctx.arc(0, 0, 1, Math.max(Math.PI, ang - 1.1), ang);
      ctx.closePath(); ctx.fill();
      // ③ 안쪽 코어 (더 밝고 좁게 — 속이 꽉 찬 느낌)
      ctx.fillStyle = `rgba(255,244,190,${a * 0.55})`;
      ctx.beginPath(); ctx.moveTo(0, 0);
      ctx.arc(0, 0, 0.72, Math.max(Math.PI, ang - 0.7), ang);
      ctx.closePath(); ctx.fill();
      // ④ 배트 끝 섬광
      ctx.fillStyle = `rgba(255,250,220,${a})`;
      ctx.beginPath();
      ctx.arc(Math.cos(ang), Math.sin(ang), 0.07, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
  }

  // 파티클
  for (const p of game.particles) {
    ctx.globalAlpha = Math.max(0, p.life * 2.5);
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - 2, p.y - 2, 4, 4);
  }
  ctx.globalAlpha = 1;

  if (game.hitFlash > 0) {
    ctx.fillStyle = `rgba(195,59,46,${game.hitFlash * 0.6})`;
    ctx.fillRect(0, 0, W, H);
  }

  // HUD
  ctx.fillStyle = "rgba(0,0,0,0.45)";
  ctx.fillRect(0, 0, W, 34);
  ctx.fillStyle = "#e8e3d8";
  ctx.font = "bold 14px sans-serif";
  ctx.textAlign = "left";
  ctx.fillText(`WAVE ${game.wave}/${CONFIG.wavesPerRun}`, 12, 22);
  if (game.campAtk > 0) {
    ctx.fillStyle = "#d9a441";
    ctx.font = "bold 11px sans-serif";
    ctx.fillText(`⚔ +${game.campAtk * 20}%`, 105, 22);
    ctx.fillStyle = "#e8e3d8";
    ctx.font = "bold 14px sans-serif";
  }
  ctx.textAlign = "right";
  ctx.fillText(`KILL ${game.killCount}`, W - 12, 22);
  ctx.textAlign = "center";
  ctx.fillStyle = "#2a2f36";
  ctx.fillRect(W / 2 - 70, 10, 140, 14);
  ctx.fillStyle = hpRatio > 0.4 ? "#5b9e4f" : "#c33b2e";
  ctx.fillRect(W / 2 - 70, 10, 140 * hpRatio, 14);
  ctx.fillStyle = "#fff";
  ctx.font = "10px sans-serif";
  ctx.fillText(`${Math.max(0, Math.ceil(game.barricadeHp))} / ${CONFIG.barricadeMaxHp}`, W / 2, 21);
}

function drawPlayer(x, y) {
  if (IMAGES.player) { ctx.drawImage(IMAGES.player, x - 24, y - 24, 48, 48); return; }
  ctx.fillStyle = "#3d5a80";
  ctx.fillRect(x - 9, y - 6, 18, 24);
  ctx.fillStyle = "#e0b48c";
  ctx.beginPath(); ctx.arc(x, y - 14, 8, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = "#2b2b2b";
  ctx.fillRect(x - 2.5, y - 32, 5, 18);
}

function drawCompanion(comp) {
  const x = comp.x, y = CONFIG.playerY + 4;
  const img = IMAGES[comp.def.id];
  if (img) {
    ctx.drawImage(img, x - 20, y - 24, 40, 40);
  } else {
    ctx.fillStyle = comp.def.color;
    ctx.fillRect(x - 8, y - 9, 16, 20);
    ctx.fillStyle = "#e0b48c";
    ctx.beginPath(); ctx.arc(x, y - 16, 7, 0, Math.PI * 2); ctx.fill();
  }
  ctx.fillStyle = comp.def.color;
  ctx.font = "bold 10px sans-serif";
  ctx.textAlign = "center";
  ctx.fillText(`${comp.def.name} Lv${comp.level}`, x, y + 24);
}

function drawZombie(z) {
  const img = z.big ? IMAGES.zombieBig : IMAGES.zombie;
  if (img) {
    const s = z.size * 2.4;
    ctx.drawImage(img, z.x - s / 2, z.y - s / 2, s, s);
  } else {
    const sway = Math.sin(z.wobble) * 2;
    ctx.fillStyle = z.big ? "#4c6b33" : "#5b7d3c";
    ctx.beginPath(); ctx.arc(z.x + sway, z.y, z.size, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = "#c33b2e";
    ctx.fillRect(z.x + sway - 5, z.y + z.size * 0.2, 4, 4);
    ctx.fillRect(z.x + sway + 2, z.y + z.size * 0.2, 4, 4);
  }
  // 물량전에선 체력바를 대형 좀비/다친 적에게만, 얇게
  if (z.hp < z.maxHp) {
    const w = z.size * 2;
    ctx.fillStyle = "rgba(0,0,0,0.5)";
    ctx.fillRect(z.x - w / 2, z.y - z.size - 9, w, 4);
    ctx.fillStyle = "#c33b2e";
    ctx.fillRect(z.x - w / 2, z.y - z.size - 9, w * (z.hp / z.maxHp), 4);
  }
}

/* ================================================================
   [12] 시작/종료 + 게임 루프
   ================================================================ */
const centerOverlay = document.getElementById("center-overlay");
const centerText = document.getElementById("center-text");
const startBtn = document.getElementById("start-btn");

startBtn.onclick = () => {
  resetGame();
  centerOverlay.style.display = "none";
  startWave(1);
  game.running = true;
};

function endGame(win) {
  game.running = false;
  const allies = allOwned().map(c => `${c.def.name} Lv${c.level}`).join(", ") || "없음";
  centerText.innerHTML = win
    ? `<b style="color:#5b9e4f">생존 성공!</b><br>${CONFIG.wavesPerRun}웨이브 클리어 · 처치 ${game.killCount}<br>동료: ${allies}`
    : `<b style="color:#c33b2e">바리케이드 붕괴...</b><br>WAVE ${game.wave} · 처치 ${game.killCount}<br>동료: ${allies}`;
  startBtn.textContent = "다시 도전";
  centerOverlay.style.display = "flex";
}

let lastTime = performance.now();
function loop(now) {
  const dt = Math.min((now - lastTime) / 1000, 0.05);
  lastTime = now;
  if (game.running && !pausedByHide && game.state === "battle") update(dt * gameSpeed);
  draw();
  requestAnimationFrame(loop);
}

resetGame();
preloadAssets(() => requestAnimationFrame(loop));
</script>
</body>
</html>

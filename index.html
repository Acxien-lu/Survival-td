/* ---- 캠프 장면 그리기: 강당 내부 이미지 + 동적 라벨 ---- */
function campLabel(text, x, y, color) {
  ctx.font = "bold 12px sans-serif";
  ctx.textAlign = "center";
  const w = ctx.measureText(text).width + 14;
  ctx.fillStyle = "rgba(20,18,16,0.72)";
  ctx.beginPath();
  ctx.roundRect(x - w / 2, y - 12, w, 18, 6);
  ctx.fill();
  ctx.fillStyle = color || "#e8d9b8";
  ctx.fillText(text, x, y + 2);
}

function drawCamp() {
  // 강당 내부 (농구 코트 + 무대 + 2층 관중석)
  if (IMAGES.campBg) {
    ctx.drawImage(IMAGES.campBg, 0, 0, W, H);
  } else {
    ctx.fillStyle = "#8a6c48";
    ctx.fillRect(0, 0, W, H);
  }

  // ---- 시설 라벨 (탭 유도) ----
  const hz = CAMP_ZONES.hall;
  campLabel(`\uD83D\uDCE2 \ubc29\uc1a1\uc2e4 \u00b7 \uacf5\uaca9\ub825 +${game.campAtk * 20}%`, hz.x + hz.w / 2 - 24, hz.y + hz.h + 12, "#d9a441");
  campLabel("\u26d1 \uc784\uc2dc \uc591\ud638\uc2e4 (\ubb34\ub300)", W / 2, CAMP_ZONES.medic.y + CAMP_ZONES.medic.h + 10);

  // ---- 게임 동아리 (코트 왼쪽 중간): 부실 매트 + 오락기 ----
  const cz = CAMP_ZONES.club;
  ctx.fillStyle = "rgba(60,52,72,0.85)";                       // 부실 매트
  ctx.fillRect(cz.x + 6, cz.y + 14, cz.w - 12, cz.h - 24);
  ctx.fillStyle = "#3a3446";                                    // 오락기 본체
  ctx.fillRect(cz.x + 20, cz.y + 24, 34, 52);
  ctx.fillStyle = clubUnlocked() ? "#7ad0ff" : "#2a2632";       // 화면 (개방 시 켜짐)
  ctx.fillRect(cz.x + 25, cz.y + 30, 24, 20);
  ctx.fillStyle = "#c33b2e";                                    // 버튼
  ctx.beginPath(); ctx.arc(cz.x + 30, cz.y + 60, 3, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = "#d9a441";
  ctx.beginPath(); ctx.arc(cz.x + 42, cz.y + 60, 3, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = "#6b5a48";                                    // 좌식 테이블
  ctx.fillRect(cz.x + 62, cz.y + 44, 42, 26);
  ctx.fillStyle = "#8a96b0";                                    // 게임패드
  ctx.fillRect(cz.x + 72, cz.y + 50, 20, 10);
  const equipped = SPECIAL_SKILLS.find(s => s.id === game.equippedSkill);
  campLabel(
    clubUnlocked()
      ? `\uD83C\uDFAE \uac8c\uc784 \ub3d9\uc544\ub9ac${equipped ? " \u00b7 " + equipped.name : ""}`
      : "\uD83C\uDFAE \uac8c\uc784 \ub3d9\uc544\ub9ac \uD83D\uDD12",
    cz.x + cz.w / 2 + 8, cz.y + 4,
    clubUnlocked() ? "#9ad0f0" : "#8a8577"
  );

  const tz = CAMP_ZONES.train;
  campLabel("\uD83C\uDFAF \uac1c\uc778 \ud6c8\ub828\uc18c", tz.x + tz.w / 2, tz.y - 10, "#e06a5c");
  const lz = CAMP_ZONES.lodge;
  campLabel(`\uD83D\uDECF \uc784\uc2dc \uae30\uc219\uc0ac \u00b7 \ucd9c\uc804 ${game.companions.length}/4`, lz.x + lz.w / 2 - 14, lz.y - 10, "#6fa3d4");

  // ---- 사감 (체육 선생님): 10웨이브 후 등장 ----
  if (game.wave >= 10) {
    const wz = CAMP_ZONES.warden;
    // 호루라기 목걸이를 건 체육 선생님 실루엣
    ctx.fillStyle = game.warden ? "#c33b2e" : "#4a5058";
    ctx.fillRect(wz.x + 44, wz.y + 40, 34, 44);          // 트레이닝복 상의
    ctx.fillStyle = "#e0b48c";
    ctx.beginPath(); ctx.arc(wz.x + 61, wz.y + 30, 12, 0, Math.PI * 2); ctx.fill();  // 머리
    ctx.fillStyle = "#2b2b2b";
    ctx.fillRect(wz.x + 50, wz.y + 18, 22, 8);           // 모자챙
    ctx.fillStyle = "#d9a441";
    ctx.beginPath(); ctx.arc(wz.x + 52, wz.y + 54, 4, 0, Math.PI * 2); ctx.fill();   // 호루라기
    ctx.strokeStyle = "#d9a441"; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(wz.x + 61, wz.y + 40); ctx.lineTo(wz.x + 52, wz.y + 54); ctx.stroke();
    campLabel(
      game.warden ? "\uD83C\uDFEB \uc0ac\uac10 (\uace0\uc6a9\ub428)" : "\uD83C\uDFEB \uccb4\uc721 \uc120\uc0dd\ub2d8",
      wz.x + wz.w / 2, wz.y + wz.h + 4,
      game.warden ? "#e06a5c" : "#b0a890"
    );
  }

  // 합류 알림
  if (game.campNotice) {
    ctx.font = "bold 12px sans-serif";
    ctx.textAlign = "center";
    ctx.fillStyle = "rgba(20,18,16,0.72)";
    const nw = ctx.measureText(game.campNotice).width + 16;
    ctx.beginPath(); ctx.roundRect(W / 2 - nw / 2, 380, nw, 20, 6); ctx.fill();
    ctx.fillStyle = "#8fd0a0";
    ctx.fillText(game.campNotice, W / 2, 394);
  }

  // ---- 상단 안내 + 보유 킬 ----
  ctx.fillStyle = "rgba(0,0,0,0.45)";
  ctx.fillRect(0, 0, W, 34);
  ctx.fillStyle = "#d9a441";
  ctx.font = "bold 14px sans-serif";
  ctx.textAlign = "left";
  ctx.fillText("\u2600 \ub0a0\uc774 \ubc1d\uc558\ub2e4 \u2014 \uac15\ub2f9", 12, 22);
  ctx.textAlign = "right";
  ctx.fillText(`\ubcf4\uc720 \ud0ac ${game.killCount}`, W - 12, 22);

  // ---- \ucd9c\uc815 \ubc84\ud2bc ----
  const dz = CAMP_ZONES.depart;
  ctx.fillStyle = "#c33b2e";
  ctx.beginPath();
  ctx.roundRect(dz.x, dz.y, dz.w, dz.h, 10);
  ctx.fill();
  ctx.fillStyle = "#fff";
  ctx.font = "bold 18px sans-serif";
  ctx.textAlign = "center";
  ctx.fillText("\ucd9c \uc815", dz.x + dz.w / 2, dz.y + 33);
  ctx.fillStyle = "rgba(20,18,16,0.72)";
  const hint = "\uc2dc\uc124\uc744 \ud0ed\ud574\uc11c \uc774\uc6a9 \u00b7 \ucd9c\uc815 \uc2dc \uce74\ub4dc \uac15\ud654 \ucd08\uae30\ud654 \u00b7 \ud6c8\ub828\uc18c\ub294 \uc601\uad6c";
  ctx.font = "11px sans-serif";
  const hw2 = ctx.measureText(hint).width + 14;
  ctx.beginPath(); ctx.roundRect(W / 2 - hw2 / 2, dz.y - 24, hw2, 17, 6); ctx.fill();
  ctx.fillStyle = "#c9b896";
  ctx.fillText(hint, W / 2, dz.y - 11);
}

/* ================================================================
   [11] 그리기 (전투)
   ================================================================ */
function draw() {
  if (game.state === "camp") { drawCamp(); return; }

  if (IMAGES.background) {
    ctx.drawImage(IMAGES.background, 0, 0, W, H);
  } else {
    const g = ctx.createLinearGradient(0, 0, 0, H);
    g.addColorStop(0, "#11151a");
    g.addColorStop(0.78, "#171c22");
    g.addColorStop(1, "#1a2027");
    ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);

    // ---- 학교 배경: 왼쪽 = 정문, 오른쪽 = 본관 (놈들이 몰려오는 방향) ----
    // 정문: 기둥 2개 + 철제 담장
    ctx.fillStyle = "#2a313a";
    ctx.fillRect(W * 0.12, 44, 12, 46);
    ctx.fillRect(W * 0.36, 44, 12, 46);
    ctx.strokeStyle = "#232a32";
    ctx.lineWidth = 3;
    for (let i = 0; i < 6; i++) {
      const gx = W * 0.15 + i * (W * 0.21 / 6) + 8;
      ctx.beginPath(); ctx.moveTo(gx, 52); ctx.lineTo(gx, 90); ctx.stroke();
    }
    // 본관: 건물 실루엣 + 창문
    ctx.fillStyle = "#252c35";
    ctx.fillRect(W * 0.58, 38, W * 0.34, 52);
    ctx.fillStyle = "#161b21";
    for (let r = 0; r < 2; r++) for (let c = 0; c < 5; c++) {
      ctx.fillRect(W * 0.60 + c * (W * 0.062), 46 + r * 22, 14, 14);
    }
  }
  // 라벨 (배경 이미지가 있어도 항상 표시)
  ctx.fillStyle = "rgba(200,190,160,0.45)";
  ctx.font = "10px sans-serif";
  ctx.textAlign = "center";
  ctx.fillText("정문", W * 0.25, 104);
  ctx.fillText("본관", W * 0.75, 104);

  // 본관 창문의 귀신: 밝은 창 안에 사람 형상의 검은 실루엣
  if (game.ghost) {
    const gx = game.ghost.wx, gy = game.ghost.wy;
    // 0.5초 동안 스르륵 나타났다 사라짐 (사인 곡선 페이드)
    const a = Math.sin((1 - game.ghost.life / 0.5) * Math.PI) * 0.9;
    ctx.fillStyle = `rgba(14,10,18,${a})`;
    ctx.beginPath(); ctx.arc(gx + 7.5, gy + 6, 3.2, 0, Math.PI * 2); ctx.fill();   // 머리
    ctx.beginPath();                                                               // 어깨~몸통
    ctx.moveTo(gx + 3, gy + 17);
    ctx.quadraticCurveTo(gx + 3, gy + 9, gx + 7.5, gy + 9);
    ctx.quadraticCurveTo(gx + 12, gy + 9, gx + 12, gy + 17);
    ctx.closePath(); ctx.fill();
  }

  // 바리케이드
  const hpRatio = Math.max(0, game.barricadeHp / CONFIG.barricadeMaxHp);
  ctx.fillStyle = hpRatio > 0.4 ? "#6b5a3e" : "#7a3b2e";
  ctx.fillRect(10, CONFIG.barricadeY - 7, W - 20, 14);
  ctx.fillStyle = "rgba(0,0,0,0.25)";
  for (let x = 20; x < W - 20; x += 26) ctx.fillRect(x, CONFIG.barricadeY - 7, 5, 14);
  ctx.fillStyle = "rgba(200,190,160,0.4)";
  ctx.font = "10px sans-serif";
  ctx.textAlign = "center";
  ctx.fillText("강당 앞 바리케이드", W / 2, CONFIG.barricadeY + 22);

  // 동료
  for (const comp of game.companions) drawCompanion(comp);

  // 축구공 (축구부 보유 공)
  for (const comp of game.companions) {
    if (!comp.balls) continue;
    for (const ball of comp.balls) {
      if (ball.special) {
        // 특수 공: 금색 발광 축구공
        ctx.fillStyle = "rgba(255,210,74,0.3)";
        ctx.beginPath(); ctx.arc(ball.x, ball.y, 11, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = "#ffd24a";
        ctx.beginPath(); ctx.arc(ball.x, ball.y, 7, 0, Math.PI * 2); ctx.fill();
        ctx.strokeStyle = "#7a5810"; ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.arc(ball.x, ball.y, 7, 0, Math.PI * 2); ctx.stroke();
        continue;
      }
      ctx.fillStyle = "#f0f0f4";
      ctx.beginPath(); ctx.arc(ball.x, ball.y, 7, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = "#24161c";
      ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.arc(ball.x, ball.y, 7, 0, Math.PI * 2); ctx.stroke();
      // 오각형 무늬 (중앙 점 + 주변 점)
      ctx.fillStyle = "#24161c";
      ctx.beginPath(); ctx.arc(ball.x, ball.y, 2.2, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(ball.x - 4, ball.y - 3, 1.3, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(ball.x + 4, ball.y - 3, 1.3, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(ball.x, ball.y + 4.5, 1.3, 0, Math.PI * 2); ctx.fill();
    }
  }

  // 주인공
  drawPlayer(game.playerX, CONFIG.playerY);

  // 좀비
  for (const z of game.zombies) drawZombie(z);

  // 의무병 접착 지역 (노란 끈적 지역)
  for (const gz of game.glueZones) {
    const a = Math.min(1, gz.t) * 0.5;
    ctx.fillStyle = `rgba(230,210,70,${a * 0.4})`;
    ctx.beginPath(); ctx.arc(gz.x, gz.y, gz.r, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = `rgba(240,225,90,${a})`;
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(gz.x, gz.y, gz.r, 0, Math.PI * 2); ctx.stroke();
  }
  // 접착 물약 (비행 중)
  for (const p of game.gluePots) {
    ctx.fillStyle = "#c9b840";
    ctx.beginPath(); ctx.arc(p.x, p.y, 6, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = "#e8d860";
    ctx.beginPath(); ctx.arc(p.x - 1.5, p.y - 1.5, 2.5, 0, Math.PI * 2); ctx.fill();
  }

  // 드론 (드라이버 강화)
  for (const dr of game.drones) {
    ctx.fillStyle = "#3a4048";
    ctx.fillRect(dr.x - 8, dr.y - 4, 16, 8);         // 본체
    ctx.fillStyle = "#c9884a";
    ctx.fillRect(dr.x - 3, dr.y - 2, 6, 4);          // 코어
    ctx.strokeStyle = "rgba(180,190,200,0.7)";       // 로터
    ctx.lineWidth = 2;
    const rot = performance.now() / 30;
    for (const sx of [-11, 11]) {
      ctx.beginPath();
      ctx.moveTo(dr.x + sx - 6 * Math.cos(rot), dr.y - 6);
      ctx.lineTo(dr.x + sx + 6 * Math.cos(rot), dr.y - 6);
      ctx.stroke();
    }
    if (dr.landed) {   // 착지 후 경고 링
      ctx.strokeStyle = `rgba(255,120,60,${0.4 + Math.sin(performance.now() / 60) * 0.3})`;
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(dr.x, dr.y, W / 4, 0, Math.PI * 2); ctx.stroke();
    }
  }

  // 차량 (형태만 다르고 판정은 동일)
  for (const car of game.cars) {
    const cimg = IMAGES[car.kind];
    if (cimg) {
      ctx.drawImage(cimg, car.x - 18, car.y - 30, 36, 60);
    } else if (car.kind === "bike") {
      // 오토바이 (위에서 본 모습): 앞뒤 바퀴 + 차체 + 핸들바 + 라이더
      ctx.fillStyle = "#1f1f24";                                   // 앞바퀴
      ctx.fillRect(car.x - 4, car.y - 26, 8, 13);
      ctx.fillRect(car.x - 4, car.y + 13, 8, 13);                  // 뒷바퀴
      ctx.fillStyle = "#c33b2e";                                   // 차체 (밝은 빨강)
      ctx.fillRect(car.x - 6, car.y - 15, 12, 30);
      ctx.fillStyle = "#2b2b2b";                                   // 핸들바 (가로로 넓게)
      ctx.fillRect(car.x - 15, car.y - 13, 30, 4);
      ctx.fillStyle = "#ffd47a";                                   // 전조등
      ctx.beginPath(); ctx.arc(car.x, car.y - 22, 3, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = "#3d5a80";                                   // 라이더 헬멧
      ctx.beginPath(); ctx.arc(car.x, car.y + 3, 7, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = "#e8e8f0";                                   // 헬멧 하이라이트
      ctx.beginPath(); ctx.arc(car.x - 2, car.y + 1, 2.5, 0, Math.PI * 2); ctx.fill();
    } else if (car.kind === "truck") {
      // 트럭: 캡 + 짐칸
      ctx.fillStyle = "#7a8a5a";
      ctx.fillRect(car.x - 14, car.y - 30, 28, 20);   // 캡 (전방)
      ctx.fillStyle = "#5a6a48";
      ctx.fillRect(car.x - 14, car.y - 8, 28, 38);    // 짐칸
      ctx.fillStyle = "#d9c9a0";
      ctx.fillRect(car.x - 9, car.y - 27, 18, 7);     // 앞유리
    } else if (car.kind === "bus") {
      // 버스: 길쭉한 차체 + 창문 줄
      ctx.fillStyle = "#c9a441";
      ctx.fillRect(car.x - 15, car.y - 35, 30, 70);
      ctx.fillStyle = "#e8e0c0";
      for (let wy = -26; wy <= 22; wy += 12) ctx.fillRect(car.x - 10, car.y + wy, 20, 6);
    } else {
      // 승용차 (기본)
      ctx.fillStyle = "#c9884a";
      ctx.fillRect(car.x - 13, car.y - 26, 26, 52);
      ctx.fillStyle = "#2b2b2b";
      ctx.fillRect(car.x - 9, car.y - 12, 18, 22);
    }
  }

  // 탄환
  for (const b of game.bullets) {
    if (b.baseball) {
      // 야구공: 흰 공 + 빨간 실밥 두 줄
      ctx.fillStyle = "#f4f2ec";
      ctx.beginPath(); ctx.arc(b.x, b.y, 5.5, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = "#c33b2e";
      ctx.lineWidth = 1.3;
      ctx.beginPath(); ctx.arc(b.x - 2, b.y, 3.6, -0.9, 0.9); ctx.stroke();
      ctx.beginPath(); ctx.arc(b.x + 2, b.y, 3.6, Math.PI - 0.9, Math.PI + 0.9); ctx.stroke();
    } else if (b.bomb) {
      ctx.fillStyle = "#b5533c";
      ctx.beginPath(); ctx.arc(b.x, b.y, 7, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = "#e8975a";
      ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.arc(b.x, b.y, 7, 0, Math.PI * 2); ctx.stroke();
    } else if (IMAGES.bullet && !b.sniper) {
      ctx.drawImage(IMAGES.bullet, b.x - 6, b.y - 6, 12, 12);
    } else {
      ctx.fillStyle = b.sniper ? "#ff4a3a" : "#ffd47a";
      ctx.beginPath(); ctx.arc(b.x, b.y, b.sniper ? 5 : 4, 0, Math.PI * 2); ctx.fill();
      if (b.sniper) {
        // 붉은 궤적: 진행 반대 방향으로 짧은 잔상
        const sp = Math.hypot(b.vx, b.vy) || 1;
        ctx.strokeStyle = "rgba(255,74,58,0.4)";
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(b.x, b.y);
        ctx.lineTo(b.x - (b.vx / sp) * 18, b.y - (b.vy / sp) * 18);
        ctx.stroke();
      }
    }
  }

  // 이펙트 (체인 번개 / 폭발 / 스윙)
  for (const e of game.effects) {
    if (e.type === "medki") {
      // 의무병 버프 기: 몸 주변 오라 + 캐릭터 키(약 48px)만큼만 위로
      const t = 1 - e.life / 0.5;
      const a = Math.sin((1 - t) * Math.PI / 2);
      const topY = e.y - 48 * Math.min(1, t * 2);
      ctx.globalAlpha = a * 0.4;
      ctx.fillStyle = e.color;
      ctx.fillRect(e.x - 16, topY, 32, e.y - topY + 8);
      ctx.globalAlpha = a * 0.85;
      ctx.fillStyle = "#c8f0dd";
      ctx.fillRect(e.x - 4, topY, 8, e.y - topY + 8);
      ctx.globalAlpha = 1;
    } else if (e.type === "ki") {
      // 기(차크라) 기둥: 동료에게서 하늘로 솟구치는 빛
      const t = 1 - e.life / 0.5;
      const a = Math.sin((1 - t) * Math.PI / 2);   // 빠르게 솟고 서서히 소멸
      const topY = e.y * (1 - Math.min(1, t * 2.5));  // 0.2초 만에 화면 끝까지
      ctx.globalAlpha = a * 0.35;
      ctx.fillStyle = e.color;
      ctx.fillRect(e.x - 14, topY, 28, e.y - topY);   // 넓은 오라
      ctx.globalAlpha = a * 0.9;
      ctx.fillStyle = "#ffffff";
      ctx.fillRect(e.x - 3, topY, 6, e.y - topY);     // 밝은 심지
      ctx.globalAlpha = 1;
    } else if (e.type === "chain") {
      // 전기(번개) 이펙트: 3중 스트로크 (넓은 글로우 → 중간 → 흰 심지)
      const a = Math.min(1, e.life * 6.5);
      ctx.lineJoin = "round";
      ctx.lineCap = "round";
      for (const [lw, color] of [
        [11, `rgba(70,150,255,${a * 0.35})`],
        [6,  `rgba(130,200,255,${a * 0.8})`],
        [2.5, `rgba(245,250,255,${a})`],
      ]) {
        ctx.lineWidth = lw;
        ctx.strokeStyle = color;
        ctx.beginPath();
        ctx.moveTo(e.pts[0].x, e.pts[0].y);
        for (let i = 1; i < e.pts.length; i++) {
          const p0 = e.pts[i - 1], p1 = e.pts[i];
          // 1/3, 2/3 지점을 좌우로 흔들어 번개 꺾임 표현
          ctx.lineTo(p0.x + (p1.x - p0.x) / 3 + (Math.random() - 0.5) * 18,
                     p0.y + (p1.y - p0.y) / 3 + (Math.random() - 0.5) * 18);
          ctx.lineTo(p0.x + (p1.x - p0.x) * 2 / 3 + (Math.random() - 0.5) * 18,
                     p0.y + (p1.y - p0.y) * 2 / 3 + (Math.random() - 0.5) * 18);
          ctx.lineTo(p1.x, p1.y);
        }
        ctx.stroke();
      }
      // 타격 지점 스파크 (감전된 적 위에 밝은 점)
      ctx.fillStyle = `rgba(200,230,255,${a})`;
      for (let i = 1; i < e.pts.length; i++) {
        ctx.beginPath();
        ctx.arc(e.pts[i].x, e.pts[i].y, 5 + Math.random() * 3, 0, Math.PI * 2);
        ctx.fill();
      }
    } else if (e.type === "carboom") {
      // 차량 유폭: 속이 꽉 찬 3겹 화염 + 충격파 링 (일반 폭발보다 훨씬 진하게)
      const t = 1 - e.life / 0.4;
      const r = e.r * (0.35 + 0.65 * t);
      ctx.fillStyle = `rgba(200,80,40,${(1 - t) * 0.4})`;      // 바깥 화염
      ctx.beginPath(); ctx.arc(e.x, e.y, r, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = `rgba(240,150,60,${(1 - t) * 0.6})`;     // 중간 화염
      ctx.beginPath(); ctx.arc(e.x, e.y, r * 0.68, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = `rgba(255,232,170,${(1 - t) * 0.85})`;   // 백열 코어
      ctx.beginPath(); ctx.arc(e.x, e.y, r * 0.36, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = `rgba(255,200,120,${1 - t})`;          // 충격파 링
      ctx.lineWidth = 5;
      ctx.beginPath(); ctx.arc(e.x, e.y, e.r * t, 0, Math.PI * 2); ctx.stroke();
    } else if (e.type === "boltburst") {
      // 번개 폭발: 푸른 원형 방전 + 방사형 스파크
      const t = 1 - e.life / (e.life > 0.25 ? 0.3 : 0.22);
      const a = Math.max(0, 1 - t);
      ctx.strokeStyle = `rgba(120,200,255,${a})`;
      ctx.lineWidth = 3;
      ctx.beginPath(); ctx.arc(e.x, e.y, e.r * (0.4 + 0.6 * t), 0, Math.PI * 2); ctx.stroke();
      ctx.strokeStyle = `rgba(220,240,255,${a})`;
      ctx.lineWidth = 1.5;
      for (let s = 0; s < 6; s++) {
        const ang = (s / 6) * Math.PI * 2 + t;
        ctx.beginPath();
        ctx.moveTo(e.x, e.y);
        ctx.lineTo(e.x + Math.cos(ang) * e.r * t, e.y + Math.sin(ang) * e.r * t);
        ctx.stroke();
      }
    } else if (e.type === "droneshot") {
      // 드론 사격 라인
      const a = Math.max(0, e.life / 0.1);
      ctx.strokeStyle = `rgba(255,210,120,${a})`;
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(e.x0, e.y0); ctx.lineTo(e.x1, e.y1); ctx.stroke();
    } else if (e.type === "impact") {
      // 착탄 섬광 (드론/특수공 등장)
      const a = Math.max(0, e.life / 0.15);
      ctx.fillStyle = `rgba(255,240,200,${a})`;
      ctx.beginPath(); ctx.arc(e.x, e.y, 8 * (1 - a) + 3, 0, Math.PI * 2); ctx.fill();
    } else if (e.type === "boom") {
      const t = 1 - e.life / 0.25;
      ctx.strokeStyle = `rgba(232,151,90,${1 - t})`;
      ctx.lineWidth = 4;
      ctx.beginPath(); ctx.arc(e.x, e.y, e.r * t, 0, Math.PI * 2); ctx.stroke();
    } else if (e.type === "swing") {
      // 채워진 부채꼴 스윕: 왼쪽→오른쪽으로 배트가 쓸고 지나가는 잔상
      const dur = 0.22;
      const t = Math.min(1, 1 - e.life / dur);                 // 스윙 진행도 (0→1)
      const a = Math.max(0, Math.min(1, e.life * 5));
      const ang = Math.PI * (1 + Math.min(1, t * 1.15));       // 배트의 현재 각도
      ctx.save();
      ctx.translate(e.x, e.y);
      ctx.scale(e.hw, e.vh);                                    // 단위원 → 타원 (가로/세로 범위 그대로)
      // ① 은은한 잔상 반원 (전체 타격 범위 표시)
      ctx.fillStyle = `rgba(212,192,90,${a * 0.16})`;
      ctx.beginPath(); ctx.moveTo(0, 0);
      ctx.arc(0, 0, 1, Math.PI, Math.PI * 2);
      ctx.closePath(); ctx.fill();
      // ② 배트를 따라오는 밝은 스윕 부채꼴
      ctx.fillStyle = `rgba(240,222,130,${a * 0.5})`;
      ctx.beginPath(); ctx.moveTo(0, 0);
      ctx.arc(0, 0, 1, Math.max(Math.PI, ang - 1.1), ang);
      ctx.closePath(); ctx.fill();
      // ③ 안쪽 코어 (더 밝고 좁게 — 속이 꽉 찬 느낌)
      ctx.fillStyle = `rgba(255,244,190,${a * 0.55})`;
      ctx.beginPath(); ctx.moveTo(0, 0);
      ctx.arc(0, 0, 0.72, Math.max(Math.PI, ang - 0.7), ang);
      ctx.closePath(); ctx.fill();
      // ④ 배트 끝 섬광
      ctx.fillStyle = `rgba(255,250,220,${a})`;
      ctx.beginPath();
      ctx.arc(Math.cos(ang), Math.sin(ang), 0.07, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
  }

  // 파티클
  for (const p of game.particles) {
    ctx.globalAlpha = Math.max(0, p.life * 2.5);
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - 2, p.y - 2, 4, 4);
  }
  ctx.globalAlpha = 1;

  // 레이저 빔: 보라-흰 3중 스트로크 (최대 체력 적 추적)
  if (game.laserBeam) {
    const lb = game.laserBeam;
    const flick = 0.85 + Math.random() * 0.15;
    for (const [lw, color] of [
      [10, `rgba(160,80,255,${0.3 * flick})`],
      [5,  `rgba(200,140,255,${0.7 * flick})`],
      [2,  `rgba(255,245,255,${flick})`],
    ]) {
      ctx.lineWidth = lw;
      ctx.strokeStyle = color;
      ctx.lineCap = "round";
      ctx.beginPath(); ctx.moveTo(lb.x0, lb.y0); ctx.lineTo(lb.x1, lb.y1); ctx.stroke();
    }
    ctx.fillStyle = `rgba(255,240,255,${flick})`;   // 타격점 섬광
    ctx.beginPath(); ctx.arc(lb.x1, lb.y1, 6, 0, Math.PI * 2); ctx.fill();
  }

  // 과부하 방전: 화면 전체에 푸른 전기 기운
  if (game.overload) {
    ctx.fillStyle = `rgba(100,170,255,${0.05 + Math.random() * 0.05})`;
    ctx.fillRect(0, 0, W, H);
  }

  // 의무병 충격파 그리기: 위로 전진하는 초록빛 파동
  if (game.pushWave) {
    const wy = game.pushWave.y;
    const grad = ctx.createLinearGradient(0, wy, 0, wy + 60);
    grad.addColorStop(0, "rgba(120,220,170,0.45)");
    grad.addColorStop(1, "rgba(91,158,125,0)");
    ctx.fillStyle = grad;
    ctx.fillRect(0, wy, W, 60);
    ctx.strokeStyle = "rgba(180,255,215,0.9)";      // 파동 선단
    ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(0, wy); ctx.lineTo(W, wy); ctx.stroke();
  }

  // 특수 스킬 발동 배너
  if (game.skillBanner) {
    const b = game.skillBanner;
    const total = 1.4;
    if (b.plain) {
      // 강화 공격/의무병 버프: 기존 단순 스타일 (슬라이드 인 + 페이드)
      const tIn = Math.min(1, (total - b.life) / 0.18);
      const tOut = Math.min(1, b.life / 0.4);
      const a = Math.min(tIn, tOut);
      const bx = 14 - (1 - tIn) * 30;
      const by = CONFIG.barricadeY - 28;
      ctx.font = "bold 17px sans-serif";
      ctx.textAlign = "left";
      const tw = ctx.measureText(b.text).width;
      ctx.globalAlpha = a * 0.65;
      ctx.fillStyle = "rgba(10,10,14,1)";
      ctx.beginPath(); ctx.roundRect(bx - 6, by - 17, tw + 16, 24, 6); ctx.fill();
      ctx.globalAlpha = a;
      ctx.fillStyle = b.color;
      ctx.fillText(b.text, bx, by);
      ctx.globalAlpha = 1;
    } else {
      // 게임 동아리 특수 스킬: 번개 테마 (튀어오름 + 지그재그 테두리 + 번쩍임)
      const prog = total - b.life;
      const tIn = Math.min(1, prog / 0.22);
      const tOut = Math.min(1, b.life / 0.45);
      const a = Math.min(tIn, tOut);
      const overshoot = tIn < 1 ? (1 - Math.pow(1 - tIn, 3)) * 1.12 - 0.12 : 1;
      const by = CONFIG.barricadeY - 30;
      const bx = 16 - (1 - overshoot) * 40;
      const flashing = prog < 0.12;
      const jitter = flashing ? (Math.random() - 0.5) * 4 : (Math.random() - 0.5) * 1.2;
      ctx.save();
      ctx.translate(bx + jitter, by + jitter);
      ctx.font = "italic 900 20px 'Arial Black', Impact, sans-serif";
      ctx.textAlign = "left";
      const tw = ctx.measureText(b.text).width;
      const padX = 12, boxH = 28, boxY = -21;
      function boltPath(x0, y0, x1, y1, segs, amp) {
        const path = [];
        for (let i = 0; i <= segs; i++) {
          const t = i / segs;
          const off = (i % 2 === 0 ? amp : -amp) * (i === 0 || i === segs ? 0 : 1);
          path.push([x0 + (x1 - x0) * t, y0 + (y1 - y0) * t + off]);
        }
        return path;
      }
      const bw = tw + padX * 2;
      ctx.beginPath();
      const top = boltPath(-padX, boxY, bw - padX, boxY, 7, 3);
      const bot = boltPath(bw - padX, boxY + boxH, -padX, boxY + boxH, 7, 3);
      [...top, ...bot].forEach(([px, py], i) => i ? ctx.lineTo(px, py) : ctx.moveTo(px, py));
      ctx.closePath();
      ctx.globalAlpha = a * 0.8;
      ctx.fillStyle = "rgba(8,8,14,1)";
      ctx.fill();
      ctx.globalAlpha = a;
      ctx.lineWidth = flashing ? 3.5 : 2;
      ctx.strokeStyle = flashing ? "#ffffff" : b.color;
      ctx.shadowColor = b.color;
      ctx.shadowBlur = flashing ? 18 : 10;
      ctx.stroke();
      ctx.shadowBlur = 0;
      ctx.globalAlpha = a;
      ctx.fillStyle = flashing ? "#ffffff" : b.color;
      ctx.fillText(b.text, 0, 0);
      if (!flashing) {
        ctx.globalAlpha = a * 0.5;
        ctx.fillStyle = "#ffffff";
        ctx.fillText(b.text, -0.5, -0.5);
      }
      ctx.restore();
      ctx.globalAlpha = 1;
    }
  }

  if (game.hitFlash > 0) {
    ctx.fillStyle = `rgba(195,59,46,${game.hitFlash * 0.6})`;
    ctx.fillRect(0, 0, W, H);
  }

  // HUD
  ctx.fillStyle = "rgba(0,0,0,0.45)";
  ctx.fillRect(0, 0, W, 34);
  ctx.fillStyle = "#e8e3d8";
  ctx.font = "bold 14px sans-serif";
  ctx.textAlign = "left";
  ctx.fillText(`WAVE ${game.wave}`, 12, 22);
  if (game.campAtk > 0) {
    ctx.fillStyle = "#d9a441";
    ctx.font = "bold 11px sans-serif";
    ctx.fillText(`⚔ +${game.campAtk * 20}%`, 105, 22);
    ctx.fillStyle = "#e8e3d8";
    ctx.font = "bold 14px sans-serif";
  }
  ctx.textAlign = "right";
  ctx.fillText(`KILL ${game.killCount}`, W - 12, 22);
  ctx.textAlign = "center";
  ctx.fillStyle = "#2a2f36";
  ctx.fillRect(W / 2 - 70, 10, 140, 14);
  ctx.fillStyle = hpRatio > 0.4 ? "#5b9e4f" : "#c33b2e";
  ctx.fillRect(W / 2 - 70, 10, 140 * hpRatio, 14);
  ctx.fillStyle = "#fff";
  ctx.font = "10px sans-serif";
  ctx.fillText(`${Math.max(0, Math.ceil(game.barricadeHp))} / ${CONFIG.barricadeMaxHp}`, W / 2, 21);
}

function drawPlayer(x, y) {
  if (IMAGES.player) { ctx.drawImage(IMAGES.player, x - 24, y - 24, 48, 48); return; }
  ctx.fillStyle = "#3d5a80";
  ctx.fillRect(x - 9, y - 6, 18, 24);
  ctx.fillStyle = "#e0b48c";
  ctx.beginPath(); ctx.arc(x, y - 14, 8, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = "#2b2b2b";
  ctx.fillRect(x - 2.5, y - 32, 5, 18);
}

function drawCompanion(comp) {
  const x = comp.x, y = CONFIG.playerY + 4;
  // 지속형 특수 스킬 버프 중이면 기&오라가 동료를 감쌈
  const buffActive =
    (comp.def.id === "batter" && game.homerunT > 0) ||
    (comp.def.id === "soccer" && game.soccerRushT > 0);
  if (buffActive) {
    const pulse = 0.55 + Math.sin(performance.now() / 90) * 0.25;
    ctx.globalAlpha = pulse * 0.55;
    ctx.fillStyle = comp.def.color;
    ctx.beginPath(); ctx.ellipse(x, y - 6, 22, 28, 0, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = pulse * 0.85;
    ctx.strokeStyle = "#ffffff";
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.ellipse(x, y - 6, 22, 28, 0, 0, Math.PI * 2); ctx.stroke();
    ctx.globalAlpha = 1;
  }
  const img = IMAGES[comp.def.id];
  if (img) {
    ctx.drawImage(img, x - 20, y - 24, 40, 40);
  } else {
    ctx.fillStyle = comp.def.color;
    ctx.fillRect(x - 8, y - 9, 16, 20);
    ctx.fillStyle = "#e0b48c";
    ctx.beginPath(); ctx.arc(x, y - 16, 7, 0, Math.PI * 2); ctx.fill();
  }
  ctx.fillStyle = comp.def.color;
  ctx.font = "bold 10px sans-serif";
  ctx.textAlign = "center";
  ctx.fillText(`${comp.def.name} Lv${comp.level}`, x, y + 24);
}

function drawZombie(z) {
  const img = z.big ? IMAGES.zombieBig : IMAGES.zombie;
  if (img) {
    const s = z.size * 2.4;
    ctx.drawImage(img, z.x - s / 2, z.y - s / 2, s, s);
  } else {
    const sway = Math.sin(z.wobble) * 2;
    ctx.fillStyle = z.big ? "#4c6b33" : "#5b7d3c";
    ctx.beginPath(); ctx.arc(z.x + sway, z.y, z.size, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = "#c33b2e";
    ctx.fillRect(z.x + sway - 5, z.y + z.size * 0.2, 4, 4);
    ctx.fillRect(z.x + sway + 2, z.y + z.size * 0.2, 4, 4);
  }
  // 물량전에선 체력바를 대형 좀비/다친 적에게만, 얇게
  if (z.hp < z.maxHp) {
    const w = z.size * 2;
    ctx.fillStyle = "rgba(0,0,0,0.5)";
    ctx.fillRect(z.x - w / 2, z.y - z.size - 9, w, 4);
    ctx.fillStyle = "#c33b2e";
    ctx.fillRect(z.x - w / 2, z.y - z.size - 9, w * (z.hp / z.maxHp), 4);
  }
}

/* ================================================================
   [12] 시작/종료 + 게임 루프
   ================================================================ */
const centerOverlay = document.getElementById("center-overlay");
const centerText = document.getElementById("center-text");
const startBtn = document.getElementById("start-btn");

startBtn.onclick = () => {
  resetGame();
  centerOverlay.style.display = "none";
  startWave(1);
  game.running = true;
};

function endGame(win) {
  game.running = false;
  const allies = allOwned().map(c => `${c.def.name} Lv${c.level}`).join(", ") || "없음";
  centerText.innerHTML =
    `<b style="color:#c33b2e">바리케이드 붕괴...</b><br>` +
    `<b style="color:#d9a441">WAVE ${game.wave}</b> 까지 생존 · 처치 ${game.killCount}<br>동료: ${allies}`;
  startBtn.textContent = "다시 도전";
  centerOverlay.style.display = "flex";
}

let lastTime = performance.now();
function loop(now) {
  const dt = Math.min((now - lastTime) / 1000, 0.05);
  lastTime = now;
  if (game.running && !pausedByHide && game.state === "battle") update(dt * gameSpeed);
  draw();
  requestAnimationFrame(loop);
}

resetGame();
preloadAssets(() => requestAnimationFrame(loop));
</script>
